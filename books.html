<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Fredoka:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap">
  <title>Best Study Books for O-Level, A-Level, GCSE, SAT & PSAT | Hungter</title>
  <meta name="description" content="Browse recommended textbooks and revision guides for Cambridge O-Level, A-Level, GCSE, SAT and PSAT — with AI-generated quizzes, flashcards and practice papers for every chapter.">
  <link rel="canonical" href="https://hungter.com/books.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Hungter — Books">
  <meta property="og:description" content="Find trusted study books and open chapter-aware AI actions.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/brand.css">
  <link rel="stylesheet" href="/nav.css">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .top-bar { height: 4px; background: var(--surface-2); }
    .top-bar-fill { height: 100%; background: linear-gradient(90deg,var(--lime),var(--blue)); width: 0%; }
    .books-main { max-width: var(--container); margin: 0 auto; padding: 24px 16px 40px; }
    .filters { display: grid; grid-template-columns: repeat(auto-fit,minmax(170px,1fr)); gap: 10px; margin: 14px 0 18px; }
    .filters select, .filters input { border: 2px solid var(--border); background: var(--surface); color: var(--ink); border-radius: 12px; padding: 10px 12px; }
    .books-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap: 14px; }
    .book-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); padding: 14px; transform: rotate(-0.5deg); }
    .book-card:nth-child(even) { transform: rotate(0.5deg); }
    .book-card h3 { margin: 8px 0 6px; font-size: 1.02rem; }
    .book-meta { color: var(--ink-faint); font-size: 0.82rem; margin: 0 0 8px; }
    .book-desc { color: var(--ink-soft); font-size: 0.9rem; min-height: 70px; }
    .book-chip { display: inline-flex; border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; font-size: 0.72rem; color: var(--ink-soft); margin-right: 6px; }
    .book-link { display: inline-flex; margin-top: 10px; background: var(--lime); color: var(--bg-deep); border-radius: 999px; padding: 9px 14px; font-family: var(--font-display); box-shadow: var(--shadow-sm); }
    .books-main h1 { font-family: var(--font-display); }
    .crumbs { display: flex; flex-wrap: wrap; gap: 8px; color: var(--ink-soft); margin-bottom: 10px; }
    .crumbs a { color: var(--ink-soft); text-decoration: none; border-bottom: 1px solid var(--border); }
    .empty-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); padding: 16px; }
    .empty-card p { margin: 0 0 8px; color: var(--ink-soft); }
    @media (max-width: 390px) {
      .books-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="books">
  <div class="top-bar"><div class="top-bar-fill" id="topBar"></div></div>
  <header class="site-nav"></header>
  <main class="books-main">
    <nav class="crumbs" aria-label="Breadcrumb">
      <a href="/">Home</a>
      <span>&gt;</span>
      <span>Books</span>
    </nav>
    <p class="eyebrow">Books</p>
    <h1 style="margin:0 0 8px;">Starter catalog (18 real entries)</h1>
    <p style="margin:0;color:var(--ink-soft);">Small and honest for launch. Add more real entries manually later in the same schema.</p>
    <div class="filters">
      <select id="sectionFilter"><option value="All">All sections</option></select>
      <select id="subjectFilter"><option value="All">All subjects</option></select>
      <input id="searchInput" type="search" placeholder="Search title or ISBN">
    </div>
    <section id="booksGrid" class="books-grid"></section>
  </main>

  <script src="/api-config.js"></script>
  <script src="/script.js"></script>
  <script src="/layout.js" defer></script>
  <script>
    ensureProfile();
    const topBar = document.getElementById('topBar');
    const sectionFilter = document.getElementById('sectionFilter');
    const subjectFilter = document.getElementById('subjectFilter');
    const searchInput = document.getElementById('searchInput');
    const booksGrid = document.getElementById('booksGrid');
    let books = [];

    function refreshTopBar() {
      const progress = getLevelProgress();
      if (topBar) topBar.style.width = `${progress.pct}%`;
    }

    function createCoverElement(book) {
      const wrap = document.createElement('div');
      wrap.className = 'book-cover-wrap';
      const img = document.createElement('img');
      img.src = `https://covers.openlibrary.org/b/isbn/${book.isbn}-L.jpg`;
      img.alt = book.title;
      img.width = 180;
      img.height = 260;
      img.className = 'book-cover';
      img.addEventListener('error', () => {
        img.remove();
        const placeholder = document.createElement('div');
        placeholder.className = 'book-cover-placeholder';
        placeholder.textContent = book.title.charAt(0);
        wrap.appendChild(placeholder);
      }, { once: true });
      wrap.appendChild(img);
      return wrap;
    }

    function populateFilters() {
      const sections = Array.from(new Set(books.map((b) => b.section))).sort();
      const subjects = Array.from(new Set(books.map((b) => b.subject))).sort();
      sectionFilter.innerHTML = ['<option value="All">All sections</option>'].concat(sections.map((s) => `<option value="${s}">${s}</option>`)).join('');
      subjectFilter.innerHTML = ['<option value="All">All subjects</option>'].concat(subjects.map((s) => `<option value="${s}">${s}</option>`)).join('');
    }

    function render() {
      const q = searchInput.value.trim().toLowerCase();
      const section = sectionFilter.value;
      const subject = subjectFilter.value;
      const filtered = books.filter((book) => {
        const matchesSection = section === 'All' || book.section === section;
        const matchesSubject = subject === 'All' || book.subject === subject;
        const hay = `${book.title} ${book.author} ${book.isbn}`.toLowerCase();
        const matchesQuery = !q || hay.includes(q);
        return matchesSection && matchesSubject && matchesQuery;
      });

      if (!filtered.length) {
        booksGrid.innerHTML = `
        <article class="empty-card">
          <div class="learn-module-head">
            <div>
              <p>No matches yet</p>
              <h3>Try another filter</h3>
            </div>
            <span class="learn-pill">Tip</span>
          </div>
          <p>No books matched your current section, subject, or search term.</p>
          <div class="learn-progress">
            <div class="learn-stat-row"><span><a href="/chat.html" class="learn-link">Ask for a recommendation →</a></span></div>
          </div>
        </article>
        `;
        return;
      }

      booksGrid.innerHTML = filtered.map((book, index) => `
        <article class="book-card">
          <div class="book-cover-host" data-cover-index="${index}" style="margin-bottom:10px;"></div>
          <h3>${book.title}</h3>
          <p class="book-meta">${book.author}</p>
          <p class="book-desc">${book.description}</p>
          <div><span class="book-chip">${book.section}</span><span class="book-chip">${book.subject}</span><span class="book-chip">ISBN ${book.isbn}</span></div>
          <a class="book-link" href="/books/${book.id}.html">Open book →</a>
        </article>
      `).join('');

      booksGrid.querySelectorAll('[data-cover-index]').forEach((host) => {
        const index = Number(host.getAttribute('data-cover-index'));
        const book = filtered[index];
        if (!book) return;
        host.appendChild(createCoverElement(book));
      });
    }

    async function init() {
      const res = await fetch('/data/books.json');
      books = await res.json();
      populateFilters();
      render();
      refreshTopBar();
    }

    sectionFilter.addEventListener('change', render);
    subjectFilter.addEventListener('change', render);
    searchInput.addEventListener('input', render);
    init().catch(() => { booksGrid.innerHTML = '<p style="color:var(--coral)">Unable to load books right now.</p>'; });
  </script>
</body>
</html>
