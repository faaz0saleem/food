  <style>
    .top-bar { height: 4px; background: var(--surface-2); }
    .top-bar-fill { height: 100%; background: linear-gradient(90deg,var(--lime),var(--blue)); width: 0%; }
    .books-main { max-width: var(--container); margin: 0 auto; padding: 24px 16px 40px; }
    .filters { display: grid; grid-template-columns: repeat(auto-fit,minmax(170px,1fr)); gap: 10px; margin: 14px 0 18px; }
    .filters select, .filters input { border: 1px solid var(--border); background: var(--surface); color: var(--ink); border-radius: 12px; padding: 10px 12px; }
    .filters select:focus, .filters input:focus { outline: none; border-color: var(--cyan); box-shadow: var(--glow-cyan); }
    .books-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(230px,1fr)); gap: 16px; }
    .book-card {
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow-sm); padding: 16px; text-decoration: none; color: var(--ink);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      position: relative; overflow: hidden;
    }
    .book-card:hover { transform: translateY(-4px); border-color: var(--border-glow); box-shadow: var(--shadow); }
    .book-cover-frame {
      height: 210px; display: flex; align-items: center; justify-content: center;
      background: var(--surface-2); border-radius: var(--radius-sm); margin-bottom: 12px; overflow: hidden;
    }
    .book-cover { max-height: 190px; max-width: 100%; border-radius: 4px; box-shadow: 0 8px 22px rgba(0,0,0,0.5); }
    .book-cover-placeholder {
      width: 120px; height: 170px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 2.4rem; font-weight: 700; color: var(--bg-deep);
      background: var(--gradient-brand);
    }
    .book-card h3 { margin: 0 0 4px; font-size: 0.98rem; line-height: 1.3; min-height: 2.6em; }
    .book-meta { color: var(--ink-faint); font-size: 0.78rem; margin: 0 0 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .book-stars { color: var(--gold); font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 6px; }
    .book-stars .count { color: var(--ink-faint); font-size: 0.74rem; letter-spacing: 0; margin-left: 4px; }
    .book-new-badge {
      display: inline-block; font-family: var(--font-mono); font-size: 0.66rem; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--cyan); border: 1px solid rgba(77,240,255,0.3);
      background: rgba(77,240,255,0.07); border-radius: 999px; padding: 2px 9px; margin-bottom: 6px;
    }
    .book-chips { margin-bottom: 8px; }
    .book-chip { display: inline-flex; border: 1px solid var(--border); border-radius: 999px; padding: 3px 9px; font-size: 0.68rem; color: var(--ink-soft); margin: 0 4px 4px 0; }
    .book-buy-row { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 8px; }
    .book-price { font-family: var(--font-display); font-weight: 700; color: var(--lime); font-size: 1.15rem; margin: 0; }
    .book-link {
      display: inline-flex; background: var(--gradient-brand); color: var(--bg-deep); border-radius: 999px;
      padding: 9px 16px; font-family: var(--font-display); font-weight: 700; font-size: 0.85rem;
      box-shadow: var(--shadow-sm); transition: box-shadow 0.15s ease;
    }
    .book-card:hover .book-link { box-shadow: var(--glow-lime); }
    .books-main h1 { font-family: var(--font-display); }
    .crumbs { display: flex; flex-wrap: wrap; gap: 8px; color: var(--ink-soft); margin-bottom: 10px; }
    .crumbs a { color: var(--ink-soft); text-decoration: none; border-bottom: 1px solid var(--border); }
    .empty-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); padding: 16px; }
    .empty-card p { margin: 0 0 8px; color: var(--ink-soft); }
    @media (max-width: 390px) {
      .books-grid { grid-template-columns: 1fr; }
    }

<body data-page="books">
  <div class="top-bar"><div class="top-bar-fill" id="topBar"></div></div>
  <header class="site-nav"></header>
  <main class="books-main">
    <nav class="crumbs" aria-label="Breadcrumb">
      <a href="/">Home</a>
      <span>&gt;</span>
      <span>Books</span>
    </nav>
    <p class="eyebrow">Book Store</p>
    <h1 style="margin:0 0 8px;">Study books, <span class="hg-gradient-text">Student subscription included</span></h1>
    <p style="margin:0;color:var(--ink-soft);">Buy any book as an instant PDF (emailed within 5 hours) or a physical copy. Every purchase includes a <strong>free Student subscription</strong> to Hungter's AI tutor. Browse and buy — no account needed.</p>
    <div class="filters">
      <select id="sectionFilter"><option value="All">All sections</option></select>
      <select id="subjectFilter"><option value="All">All subjects</option></select>
      <input id="searchInput" type="search" placeholder="Search title or ISBN">
    </div>
    <section id="booksGrid" class="books-grid"></section>
  </main>

  <script src="/api-config.js?v=20260713"></script>
  <script src="/script.js?v=20260713"></script>
  <script src="/layout.js?v=20260713" defer></script>
  <script>
    ensureProfile();
    const topBar = document.getElementById('topBar');
    const sectionFilter = document.getElementById('sectionFilter');
    const subjectFilter = document.getElementById('subjectFilter');
    const searchInput = document.getElementById('searchInput');
    const booksGrid = document.getElementById('booksGrid');
    let books = [];

    function refreshTopBar() {
      const progress = getLevelProgress();
      if (topBar) topBar.style.width = `${progress.pct}%`;
    }

    function createCoverElement(book) {
      const img = document.createElement('img');
      img.src = `https://covers.openlibrary.org/b/isbn/${book.isbn}-L.jpg`;
      img.alt = book.title;
      img.loading = 'lazy';
      img.className = 'book-cover';
      const host = document.createElement('div');
      host.style.display = 'contents';
      img.addEventListener('error', () => {
        img.remove();
        const placeholder = document.createElement('div');
        placeholder.className = 'book-cover-placeholder';
        placeholder.textContent = book.title.charAt(0);
        host.appendChild(placeholder);
      }, { once: true });
      // Some ISBNs return a 1x1 pixel instead of a 404 — treat those as missing.
      img.addEventListener('load', () => {
        if (img.naturalWidth < 10) img.dispatchEvent(new Event('error'));
      }, { once: true });
      host.appendChild(img);
      return host;
    }

    function populateFilters() {
      const sections = Array.from(new Set(books.map((b) => b.section))).sort();
      const subjects = Array.from(new Set(books.map((b) => b.subject))).sort();
      sectionFilter.innerHTML = ['<option value="All">All sections</option>'].concat(sections.map((s) => `<option value="${s}">${s}</option>`)).join('');
      subjectFilter.innerHTML = ['<option value="All">All subjects</option>'].concat(subjects.map((s) => `<option value="${s}">${s}</option>`)).join('');
    }

    function render() {
      const q = searchInput.value.trim().toLowerCase();
      const section = sectionFilter.value;
      const subject = subjectFilter.value;
      const filtered = books.filter((book) => {
        const matchesSection = section === 'All' || book.section === section;
        const matchesSubject = subject === 'All' || book.subject === subject;
        const hay = `${book.title} ${book.author} ${book.isbn}`.toLowerCase();
        const matchesQuery = !q || hay.includes(q);
        return matchesSection && matchesSubject && matchesQuery;
      });

      if (!filtered.length) {
        booksGrid.innerHTML = `
        <article class="empty-card">
          <div class="learn-module-head">
            <div>
              <p>No matches yet</p>
              <h3>Try another filter</h3>
            </div>
            <span class="learn-pill">Tip</span>
          </div>
          <p>No books matched your current section, subject, or search term.</p>
          <div class="learn-progress">
            <div class="learn-stat-row"><span><a href="/chat" class="learn-link">Ask for a recommendation →</a></span></div>
          </div>
        </article>
        `;
        return;
      }

      booksGrid.innerHTML = filtered.map((book, index) => {
        const reviews = lsGet(`mm_book_reviews_${book.id}`, []);
        const avg = reviews.length ? reviews.reduce((s, r) => s + (Number(r.rating) || 5), 0) / reviews.length : 0;
        const ratingRow = reviews.length
          ? `<div class="book-stars">${'★★★★★☆☆☆☆☆'.slice(5 - Math.round(avg), 10 - Math.round(avg))}<span class="count">${avg.toFixed(1)} (${reviews.length})</span></div>`
          : '<div><span class="book-new-badge">✦ New arrival</span></div>';
        return `
        <a class="book-card" href="/books/${book.id}">
          <div class="book-cover-frame" data-cover-index="${index}"></div>
          <h3>${book.title}</h3>
          <p class="book-meta">${book.author}</p>
          ${ratingRow}
          <div class="book-chips"><span class="book-chip">${book.section}</span><span class="book-chip">${book.subject}</span></div>
          <div class="book-buy-row">
            <p class="book-price">${Number(book.price || 0) > 0 ? `$${Number(book.price).toFixed(2)}` : ''}</p>
            <span class="book-link">View →</span>
          </div>
        </a>`;
      }).join('');

      booksGrid.querySelectorAll('[data-cover-index]').forEach((host) => {
        const index = Number(host.getAttribute('data-cover-index'));
        const book = filtered[index];
        if (!book) return;
        host.appendChild(createCoverElement(book));
      });
    }

    async function init() {
      const res = await fetch('/api/books.php').catch(function(){return fetch('/data/books.json');});
      books = await res.json();
      populateFilters();
      render();
      refreshTopBar();
    }

    sectionFilter.addEventListener('change', render);
    subjectFilter.addEventListener('change', render);
    searchInput.addEventListener('input', render);
    init().catch(() => { booksGrid.innerHTML = '<p style="color:var(--coral)">Unable to load books right now.</p>'; });
  </script>
</body>
</html>
