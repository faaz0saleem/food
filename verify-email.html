<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email | Hungter</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body data-page="verify-email">
  <main class="page-card" style="max-width:520px;margin:60px auto;padding:24px;">
    <h1>Verify your email</h1>
    <p>Request a 6-digit verification code, then enter it below.</p>
    <button id="requestBtn" class="button button-secondary">Request code</button>
    <p id="codeHint" style="margin-top:8px;color:#a9b2d6;"></p>
    <input id="codeInput" type="text" maxlength="6" placeholder="6-digit code" style="width:100%;margin-top:12px;" />
    <button id="verifyBtn" class="button button-primary" style="margin-top:10px;">Verify email</button>
    <p id="status"></p>
  </main>
  <script src="/api-config.js"></script>
  <script>
    const API_BASE = String(window.HUNGTER_API_BASE || '').replace(/\/$/, '');
    const apiPath = (p) => `${API_BASE}${p}`;
    const getToken = () => {
      try { return JSON.parse(localStorage.getItem('mm_auth_token') || '""'); } catch { return ''; }
    };
    const headers = () => ({ 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` });
    const status = document.getElementById('status');

    document.getElementById('requestBtn').addEventListener('click', async () => {
      status.textContent = 'Requesting code...';
      const res = await fetch(apiPath('/api/auth/request-verification'), { method: 'POST', headers: headers(), body: '{}' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { status.textContent = data.error || 'Failed to request code.'; return; }
      if (data.devCode) document.getElementById('codeHint').textContent = `Dev code: ${data.devCode}`;
      status.textContent = 'Code generated. Enter it below.';
    });

    document.getElementById('verifyBtn').addEventListener('click', async () => {
      const code = (document.getElementById('codeInput').value || '').trim();
      status.textContent = 'Verifying...';
      const res = await fetch(apiPath('/api/auth/verify-email'), {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({ code }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { status.textContent = data.error || 'Verification failed.'; return; }
      status.textContent = 'Email verified successfully.';
    });
  </script>
</body>
</html>
