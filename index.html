<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glow Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <section class="hero-card">
            <div class="hero-copy">
          <p class="eyebrow">AI concierge</p>
          <h1>Meet your polished website chatbot.</h1>
          <p class="hero-text">
            A friendly assistant that answers questions, helps visitors, and feels right at home on your site.
          </p>
          <div class="chip-row">
            <span>Fast replies</span>
            <span>Live visitor stats</span>
            <span>Website actions</span>
          </div>

          <div class="stats-grid">
            <div class="stat-item">
              <span class="stat-value" id="stat-users-today">—</span>
              <span class="stat-label">Active today</span>
            </div>
            <div class="stat-item">
              <span class="stat-value" id="stat-users-month">—</span>
              <span class="stat-label">Active this month</span>
            </div>
            <div class="stat-item">
              <span class="stat-value" id="stat-total-chats">—</span>
              <span class="stat-label">Total chats</span>
            </div>
            <div class="stat-item">
              <span class="stat-value" id="stat-total-messages">—</span>
              <span class="stat-label">Total messages</span>
            </div>
          </div>
        </div>

        <div class="chat-card">
          <div class="chat-header">
            <div class="avatar">✦</div>
            <div>
              <h2>Glow Assistant</h2>
              <p>Online now</p>
            </div>
          </div>

          <div id="messages" class="messages" aria-live="polite"></div>

          <form id="chat-form" class="composer">
            <input
              id="message-input"
              type="text"
              placeholder="Ask me anything..."
              autocomplete="off"
            />
            <button type="submit">Send</button>
          </form>
        </div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
