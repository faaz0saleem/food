name: CI

on:
  pull_request:
  push:
    branches: [main, feature/mvp]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: docker build -t lahore-booking:${{ github.sha }} .
