[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

# The admin dashboard is a local-only tool (run `node server.js` and open
# localhost:3000/admin.html). These blocks keep it off the public deploy —
# they only apply to the Netlify-hosted site, never to local dev.
[[redirects]]
  from = "/admin.html"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/api/admin-stats"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/.netlify/functions/api/admin-stats"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
