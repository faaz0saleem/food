<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Sign in — Hungter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap">

<style>
  /* Intentionally NO site nav here — this is a clean gate. */
  body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px;
    background: var(--bg-deep); background-image: var(--gradient-aurora); background-attachment: fixed;
    font-family: var(--font-body); color: var(--ink); }
  .auth { width: 100%; max-width: 400px; text-align: center; background: rgba(13,20,40,0.82);
    border: 1px solid var(--border-glow); border-radius: var(--radius); padding: 40px 30px; box-shadow: var(--shadow); }
  .auth .logo { font-family: var(--font-display); font-weight: 700; font-size: 1.4rem; }
  .auth .logo .g { background: var(--gradient-brand); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .auth h1 { font-family: var(--font-display); font-size: 1.5rem; letter-spacing: -0.02em; margin: 18px 0 8px; }
  .auth p { color: var(--ink-soft); line-height: 1.6; margin: 0 0 26px; font-size: 0.92rem; }
  .gbtn-wrap { display: flex; justify-content: center; min-height: 44px; }
  .auth .err { color: var(--coral); font-size: 0.85rem; margin-top: 16px; min-height: 1em; }
  .auth .fine { color: var(--ink-faint); font-size: 0.72rem; margin-top: 22px; line-height: 1.6; }
  .auth .fine a { color: var(--ink-soft); }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--lime); border-radius: 50%; animation: spin 0.9s linear infinite; display: none; margin: 12px auto 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .divider { display: flex; align-items: center; gap: 10px; color: var(--ink-faint); font-size: 0.76rem; margin: 20px 0 14px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-soft); }
  .mform input { width: 100%; box-sizing: border-box; border: 1px solid var(--border); background: var(--surface-2); color: var(--ink); border-radius: 10px; padding: 12px 13px; margin: 6px 0; font-family: var(--font-body); font-size: 0.92rem; }
  .mform input:focus { outline: none; border-color: var(--cyan); }
  .mbtn { width: 100%; border: none; border-radius: 999px; padding: 12px; margin-top: 8px; font-family: var(--font-display); font-weight: 700; background: var(--gradient-brand); color: var(--bg-deep); cursor: pointer; box-shadow: var(--glow-lime); }
  .mtoggle { font-size: 0.82rem; color: var(--ink-soft); margin-top: 12px; }
  .mtoggle a { color: var(--cyan); cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
  <div class="auth">
    <div class="logo">⚡ <span class="g">Hungter</span></div>
    <h1>Sign in to continue</h1>
    <p>The tutor that gets you. Sign in with Google — it's free, and it's the only step.</p>
    <div class="gbtn-wrap">
      <div id="g_id_onload"
           data-client_id="222174024094-g85g7rm3mhjjcmp93j2e4thgd2pvhm3s.apps.googleusercontent.com"
           data-callback="onGoogleCredential" data-auto_prompt="false"></div>
      <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large" data-shape="pill" data-text="continue_with" data-logo_alignment="center"></div>
    </div>
    <div class="spinner" id="spin"></div>

    <div class="divider">or use email</div>
    <div class="mform">
      <input id="mName" type="text" placeholder="Your name" autocomplete="name" style="display:none;">
      <input id="mEmail" type="email" placeholder="Email" autocomplete="email">
      <input id="mPass" type="password" placeholder="Password" autocomplete="current-password">
      <button class="mbtn" id="mSubmit" type="button">Sign in</button>
      <p class="mtoggle" id="mToggle">New to Hungter? <a id="mToggleLink">Create an account</a></p>
    </div>

    <p class="err" id="err"></p>
    <p class="fine">By continuing you agree to our <a href="/terms">Terms</a> and <a href="/privacy">Privacy Policy</a>.</p>
  </div>

<script src="/api-config.js?v=20260720"></script>
<script>
  function ls(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }
  function apiBase() { return String(window.HUNGTER_API_BASE || '').replace(/\/$/, ''); }

  // Where to land after sign-in (e.g. /select-plan sends ?next=/chat). Same-site only.
  function nextDest() {
    var n = new URLSearchParams(location.search).get('next') || '';
    return /^\/[a-z0-9\-\/]*$/i.test(n) ? n : '/dashboard';
  }

  // Already signed in? Skip straight in (honouring ?next=).
  try { if (JSON.parse(localStorage.getItem('mm_auth_token') || 'null')) location.replace(nextDest()); } catch (e) {}

  async function onGoogleCredential(resp) {
    const err = document.getElementById('err');
    const spin = document.getElementById('spin');
    err.textContent = ''; spin.style.display = 'block';
    const urls = [apiBase() + '/api/auth/google.php', apiBase() + '/api/auth/google'];
    let data = null;
    for (const u of urls) {
      try {
        const r = await fetch(u, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ credential: resp.credential }) });
        const ct = String(r.headers.get('content-type') || '');
        if (r.ok || ct.includes('application/json')) { data = await r.json(); break; }
      } catch (e) {}
    }
    spin.style.display = 'none';
    if (!applyAuth(data)) {
      err.textContent = (data && data.error) ? data.error : 'Sign-in failed. Please try again.';
    }
  }
  window.onGoogleCredential = onGoogleCredential;

  // Store the session and route — shared by Google + email/password sign-in.
  function applyAuth(data) {
    if (!data || !data.token) return false;
    ls('mm_auth_token', data.token);
    ls('mm_authed', true);
    if (data.user) {
      if (data.user.name) ls('mm_name', data.user.name);
      if (data.user.email) ls('mm_email', data.user.email);
      if (data.user.picture) ls('mm_avatar', data.user.picture);
      if (data.user.planName) ls('mm_plan', data.user.planName);
      if (data.user.planStatus) ls('mm_plan_status', data.user.planStatus);
    }
    var onboarded = data.onboarded || (data.user && data.user.onboarded);
    ls('mm_onboarded', onboarded ? true : false);
    var dest = nextDest();
    // New users go through onboarding first, then continue to where they were headed.
    if (!onboarded) { ls('mm_next', dest); location.replace('/onboarding'); }
    else location.replace(dest);
    return true;
  }

  // ── Manual email / password (accounts are stored in the database) ───────────
  var mMode = 'login';
  var mName = document.getElementById('mName'), mEmail = document.getElementById('mEmail'),
      mPass = document.getElementById('mPass'), mSubmit = document.getElementById('mSubmit');
  document.getElementById('mToggle').addEventListener('click', function (e) {
    if (e.target.id !== 'mToggleLink') return;
    mMode = mMode === 'login' ? 'signup' : 'login';
    mName.style.display = mMode === 'signup' ? 'block' : 'none';
    mSubmit.textContent = mMode === 'signup' ? 'Create account' : 'Sign in';
    mPass.setAttribute('autocomplete', mMode === 'signup' ? 'new-password' : 'current-password');
    this.innerHTML = mMode === 'signup'
      ? 'Already have an account? <a id="mToggleLink">Sign in</a>'
      : 'New to Hungter? <a id="mToggleLink">Create an account</a>';
  });
  async function manualAuth() {
    document.getElementById('err').textContent = '';
    var email = mEmail.value.trim(), pass = mPass.value, name = mName.value.trim();
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { document.getElementById('err').textContent = 'Please enter a valid email.'; return; }
    if (pass.length < 8) { document.getElementById('err').textContent = 'Password must be at least 8 characters.'; return; }
    if (mMode === 'signup' && !name) { document.getElementById('err').textContent = 'Please enter your name.'; return; }
    document.getElementById('spin').style.display = 'block'; mSubmit.disabled = true;
    var path = mMode === 'signup' ? '/api/auth/signup' : '/api/auth/login';
    var payload = mMode === 'signup' ? { name: name, email: email, password: pass } : { email: email, password: pass };
    var data = null, urls = [apiBase() + path + '.php', apiBase() + path];
    for (var i = 0; i < urls.length; i++) {
      try {
        var r = await fetch(urls[i], { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        var ct = String(r.headers.get('content-type') || '');
        if (r.ok || ct.indexOf('application/json') >= 0) { data = await r.json(); break; }
      } catch (e) {}
    }
    document.getElementById('spin').style.display = 'none'; mSubmit.disabled = false;
    if (!applyAuth(data)) { document.getElementById('err').textContent = (data && data.error) ? data.error : 'Could not sign in. Please try again.'; }
  }
  mSubmit.addEventListener('click', manualAuth);
  mPass.addEventListener('keydown', function (e) { if (e.key === 'Enter') manualAuth(); });
</script>
</body>
</html>
