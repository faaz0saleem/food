<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Fredoka:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap">
  <title>Hungter — Book</title>
  <meta name="description" content="Book detail with chapter-aware AI quiz, flashcards, and guess paper generation.">
  <link rel="canonical" href="https://hungter.com/book.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Hungter — Book">
  <meta property="og:description" content="Use AI actions on selected topics without reproducing source text.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/brand.css">
  <link rel="stylesheet" href="/nav.css">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .top-bar { height: 4px; background: var(--surface-2); }
    .top-bar-fill { height: 100%; background: linear-gradient(90deg,var(--lime),var(--blue)); width: 0%; }
    .book-main { max-width: var(--container); margin: 0 auto; padding: 22px 16px 44px; }
    .book-layout { display: grid; grid-template-columns: 280px 1fr; gap: 18px; }
    .book-panel { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); padding: 14px; }
    .topic-select { width: 100%; border: 2px solid var(--border); background: var(--surface-2); color: var(--ink); border-radius: 12px; padding: 10px; margin: 10px 0; }
    .btn-row { display:flex; flex-wrap: wrap; gap:8px; margin-top: 8px; }
    .btn { border:1px solid var(--border); background: var(--surface-2); color: var(--ink); border-radius: 999px; padding: 8px 12px; cursor: pointer; }
    .btn.primary { background: var(--lime); color: var(--bg-deep); border: none; box-shadow: var(--shadow-sm); }
    .loading { display:none; margin-top: 8px; color: var(--ink-soft); }
    .loading.show { display:flex; align-items:center; gap:8px; }
    .spinner { width:14px; height:14px; border-radius:50%; border:2px solid var(--border); border-top-color: var(--lime); animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-box { margin-top: 12px; white-space: pre-wrap; color: var(--ink-soft); }
    .faq-item { border-top:1px solid var(--border-soft); padding-top:10px; margin-top:10px; }
    .similar-row { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:10px; margin-top:10px; }
    .review-form textarea, .review-form input { width:100%; border:2px solid var(--border); background:var(--surface-2); color:var(--ink); border-radius:10px; padding:8px; margin:6px 0; }
    .bq-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-top: 10px; }
    .bq-q { margin: 0 0 10px; font-weight: 600; }
    .bq-opts { display: grid; gap: 8px; }
    .bq-opt {
      text-align: left; cursor: pointer; padding: 10px 12px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--ink); font-family: var(--font-body);
      transition: border-color 0.15s;
    }
    .bq-opt:hover:not(:disabled) { border-color: var(--cyan, var(--blue)); }
    .bq-opt:disabled { cursor: default; opacity: 0.85; }
    .bq-opt.bq-correct { border-color: var(--lime); box-shadow: 0 0 10px rgba(200,255,77,0.25); }
    .bq-opt.bq-wrong { border-color: var(--coral); opacity: 0.6; }
    .bq-expl { margin: 10px 0 0; color: var(--ink-soft); font-size: 0.88rem; border-left: 2px solid var(--lime); padding-left: 10px; }
    .bq-result { margin-top: 14px; padding: 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); text-align: center; }
    .bq-score { font-family: var(--font-display); font-size: 2.2rem; color: var(--lime); margin: 0; }
    .notes-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; margin-top: 12px; }
    .notes-heading { font-family: var(--font-mono); font-size: 0.78rem; letter-spacing: 0.1em; color: var(--cyan, var(--blue)); margin: 16px 0 6px; text-transform: uppercase; }
    .notes-list { margin: 0 0 8px; padding-left: 18px; color: var(--ink-soft); }
    .notes-list li { margin: 4px 0; }
    .notes-para { margin: 6px 0; color: var(--ink-soft); }
    @media print {
      body * { visibility: hidden; }
      #notesPanel, #notesPanel * { visibility: visible; }
      #notesPanel { position: absolute; left: 0; top: 0; width: 100%; color: #000; background: #fff; border: none; }
    }
    @media (max-width: 860px) { .book-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body data-page="book">
  <div class="top-bar"><div class="top-bar-fill" id="topBar"></div></div>
  <header class="site-nav"></header>
  <main class="book-main">
    <div id="book-content" class="book-layout"></div>
  </main>

  <script src="/api-config.js"></script>
  <script src="/script.js"></script>
  <script src="/layout.js" defer></script>
  <script>
    ensureProfile();
    // apiPath is the global from script.js — redeclaring it here is a SyntaxError that kills the page.

    const topBar = document.getElementById('topBar');

    function refreshTopBar() {
      const progress = getLevelProgress();
      if (topBar) topBar.style.width = `${progress.pct}%`;
    }

    function createCoverElement(book) {
      const wrap = document.createElement('div');
      wrap.className = 'book-cover-wrap';
      const img = document.createElement('img');
      img.src = `https://covers.openlibrary.org/b/isbn/${book.isbn}-L.jpg`;
      img.alt = book.title;
      img.className = 'book-cover';
      img.addEventListener('error', () => {
        img.remove();
        const placeholder = document.createElement('div');
        placeholder.className = 'book-cover-placeholder';
        placeholder.textContent = book.title.charAt(0);
        wrap.appendChild(placeholder);
      }, { once: true });
      wrap.appendChild(img);
      return wrap;
    }

    function buyUrl(isbn) { return `https://www.amazon.com/s?k=${isbn}&tag=YOURTAG-20`; }

    function getPlan() {
      const raw = lsGet('mm_plan', 'free');
      return String(raw || 'free').toLowerCase().includes('pro') ? 'pro' : 'free';
    }

    function saveReview(bookId, review) {
      const key = `mm_book_reviews_${bookId}`;
      const items = lsGet(key, []);
      items.push(review);
      lsSet(key, items.slice(-100));
    }

    function getReviews(bookId) {
      return lsGet(`mm_book_reviews_${bookId}`, []);
    }

    function appendGeneratedFlashcards(cards, bookTitle) {
      const existing = lsGet('mm_flashcards', []);
      const mapped = (cards || []).map((card) => ({
        front: card.front,
        back: card.back,
        source: `Book: ${bookTitle}`,
        nextReviewDate: new Date(Date.now() + 2 * 86400000).toISOString().slice(0, 10),
        createdAt: new Date().toISOString(),
      }));
      lsSet('mm_flashcards', existing.concat(mapped).slice(-400));
    }

    async function postJson(path, payload) {
      const response = await fetch(apiPath(path), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await response.json();
      if (!response.ok || data?.error) {
        throw new Error(data?.error || 'Request failed');
      }
      return data;
    }

    function renderInteractiveQuiz(questions, book, chapter, mount) {
      let answered = 0;
      let score = 0;
      const wrongAnswers = [];

      mount.innerHTML = `
        <div class="bq-head">
          <h3 style="margin:12px 0 2px;">Quiz: ${chapter || book.subject}</h3>
          <p style="margin:0 0 10px;color:var(--ink-faint);font-size:0.85rem;">Click an answer for each question. Scores count toward your real progress and XP.</p>
        </div>
        <div id="bqQuestions"></div>
        <div id="bqSummary" style="display:none;"></div>
      `;
      const questionsWrap = mount.querySelector('#bqQuestions');
      const summary = mount.querySelector('#bqSummary');

      questions.forEach((q, qi) => {
        const correctLetter = String(q.correct || 'A').trim().toUpperCase().charAt(0);
        const card = document.createElement('article');
        card.className = 'bq-card';
        card.innerHTML = `<p class="bq-q">${qi + 1}. ${q.question}</p>`;
        const optsWrap = document.createElement('div');
        optsWrap.className = 'bq-opts';

        (q.options || []).forEach((optionText, oi) => {
          const letter = String.fromCharCode(65 + oi); // A, B, C, D
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'bq-opt';
          btn.textContent = optionText;
          btn.addEventListener('click', () => {
            if (card.dataset.done) return;
            card.dataset.done = 'true';
            answered += 1;
            const isCorrect = letter === correctLetter;
            if (isCorrect) score += 1;
            optsWrap.querySelectorAll('.bq-opt').forEach((b, bi) => {
              b.disabled = true;
              const bLetter = String.fromCharCode(65 + bi);
              if (bLetter === correctLetter) b.classList.add('bq-correct');
              else if (b === btn) b.classList.add('bq-wrong');
            });
            if (!isCorrect) {
              wrongAnswers.push({
                subject: book.subject,
                question: q.question,
                selected: optionText,
                correct: (q.options || [])[correctLetter.charCodeAt(0) - 65] || correctLetter,
              });
            }
            if (q.explanation) {
              const expl = document.createElement('p');
              expl.className = 'bq-expl';
              expl.textContent = q.explanation;
              card.appendChild(expl);
            }
            if (answered === questions.length) finishQuiz();
          });
          optsWrap.appendChild(btn);
        });

        card.appendChild(optsWrap);
        questionsWrap.appendChild(card);
      });

      function finishQuiz() {
        const percent = Math.round((score / questions.length) * 100);

        // Identical persistence to quiz.html so progress/dashboard/XP pick it up unchanged
        const quizHistory = lsGet('mm_quiz_scores', {});
        quizHistory[book.subject] = [...(quizHistory[book.subject] || []), percent];
        lsSet('mm_quiz_scores', quizHistory);

        if (wrongAnswers.length) {
          const existingWrong = lsGet('mm_wrong_answers', []);
          lsSet('mm_wrong_answers', existingWrong.concat(wrongAnswers).slice(-200));
        }

        const milestones = lsGet('mm_milestones', []);
        milestones.push({ event: `Scored ${percent}% on a ${book.title} quiz${chapter ? ` (${chapter})` : ''}`, date: new Date().toLocaleDateString() });
        lsSet('mm_milestones', milestones);

        updateLevel();
        refreshTopBar();

        summary.style.display = 'block';
        summary.innerHTML = `
          <div class="bq-result">
            <p class="bq-score">${percent}%</p>
            <p style="margin:0;color:var(--ink-soft);">${score} of ${questions.length} correct — saved to your progress.</p>
            <div class="btn-row" style="margin-top:10px;">
              <button type="button" class="btn" id="bqAgain">Try another quiz</button>
              <a class="btn" href="/progress.html">See my progress →</a>
            </div>
          </div>
        `;
        summary.querySelector('#bqAgain')?.addEventListener('click', () => {
          document.getElementById('quizBtn')?.click();
        });
        summary.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function renderChapterNotes(rawNotes, engineName, topicLabel, mount) {
      const KNOWN_HEADINGS = ['OVERVIEW', 'KEY POINTS', 'FORMULAS & DEFINITIONS', 'COMMON MISTAKES', 'EXAM TIPS'];
      const lines = String(rawNotes || '').split('\n');
      let html = `<div class="notes-head"><h3 style="margin:12px 0 2px;">Chapter notes: ${topicLabel}</h3>` +
        `<p style="margin:0 0 10px;color:var(--ink-faint);font-size:0.8rem;">AI-generated original notes (${engineName}) — not copied from the book.</p></div>`;
      let inList = false;
      lines.forEach((line) => {
        const trimmed = line.trim();
        const isHeading = KNOWN_HEADINGS.some((h) => trimmed.toUpperCase().startsWith(h));
        const isBullet = /^[-•*]\s+/.test(trimmed);
        if (isHeading) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<h4 class="notes-heading">${trimmed}</h4>`;
        } else if (isBullet) {
          if (!inList) { html += '<ul class="notes-list">'; inList = true; }
          html += `<li>${trimmed.replace(/^[-•*]\s+/, '')}</li>`;
        } else if (trimmed) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<p class="notes-para">${trimmed}</p>`;
        }
      });
      if (inList) html += '</ul>';
      html += `<div class="btn-row" style="margin-top:12px;">
        <button type="button" class="btn" id="notesCopyBtn">Copy notes</button>
        <button type="button" class="btn" id="notesPrintBtn">Print / Save as PDF</button>
      </div>`;
      mount.innerHTML = `<div class="notes-panel" id="notesPanel">${html}</div>`;
      mount.querySelector('#notesCopyBtn')?.addEventListener('click', () => {
        navigator.clipboard.writeText(rawNotes).then(() => {
          mount.querySelector('#notesCopyBtn').textContent = 'Copied ✓';
        });
      });
      mount.querySelector('#notesPrintBtn')?.addEventListener('click', () => window.print());
      mount.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    (function () {
      const bookId = new URLSearchParams(window.location.search).get('id');
      const container = document.getElementById('book-content');
      fetch('/data/books.json')
        .then((res) => { if (!res.ok) throw new Error('Failed to load catalog'); return res.json(); })
        .then((books) => {
          const book = books.find((b) => b.id === bookId);
          if (!book) { container.innerHTML = '<p>Book not found. <a href="/books.html">Back to catalog</a></p>'; return; }
          renderBook(book, books);
        })
        .catch((error) => {
          console.error('Book load failed:', error.message);
          container.innerHTML = '<p>Unable to load this book right now. <a href="/books.html">Back to catalog</a></p>';
        });

      function renderBook(book, allBooks) {
        document.title = `${book.title} | Hungter`;
        container.innerHTML = '';

        const aside = document.createElement('aside');
        aside.className = 'book-panel';
        aside.appendChild(createCoverElement(book));
        aside.insertAdjacentHTML('beforeend', `
          <a href="${buyUrl(book.isbn)}" target="_blank" rel="noopener" class="btn primary" style="display:inline-flex;margin-top:10px;">Buy on Amazon</a>
          <div class="btn-row">
            <button class="btn" id="quizBtn">Generate Quiz</button>
            <button class="btn" id="flashBtn">Generate Flashcards</button>
            <button class="btn" id="paperBtn">Generate Guess Paper</button>
          </div>
          <div id="loadingState" class="loading"><span class="spinner"></span><span>Generating with all 3 AIs - this can take 15-30 seconds...</span></div>
        `);
        container.appendChild(aside);

        const info = document.createElement('section');
        info.className = 'book-panel';
        const similar = allBooks.filter((b) => b.id !== book.id && b.section === book.section && b.subject === book.subject).slice(0, 3);
        const reviews = getReviews(book.id);
        info.innerHTML = `
          <p class="eyebrow">${book.section} · ${book.subject}</p>
          <h1 style="margin:0 0 8px;">${book.title}</h1>
          <p class="book-author" style="margin:0;color:var(--ink-faint);">${book.author}</p>
          <p style="margin:10px 0;color:var(--ink-soft);">${book.description}</p>

          <label for="topicSelect" class="quiz-label">Chapter / topic</label>
          <select id="topicSelect" class="topic-select">
            <option value="">Whole subject (all topics)</option>
            ${(book.topics || []).map((topic) => `<option value="${topic}">${topic}</option>`).join('')}
          </select>

          <div class="btn-row" style="margin-top:6px;">
            <button class="btn primary" id="chapterNotesBtn">📖 Chapter Notes — key points & formulas</button>
            <button class="btn" id="studyPlanBtn">Build my study plan</button>
            <button class="btn" id="compareBooksBtn">Compare with similar books</button>
          </div>

          <div id="resultBox" class="result-box"></div>

          <div class="faq-item"><h3 style="margin:0 0 6px;">Similar books</h3>
            <div class="similar-row">
              ${similar.length ? similar.map((item) => `<a class="book-panel" style="padding:10px;display:block;" href="/book.html?id=${item.id}"><strong>${item.title}</strong><p style="margin:6px 0 0;color:var(--ink-faint);">${item.section} · ${item.subject}</p></a>`).join('') : '<p style="color:var(--ink-soft);">No close matches yet.</p>'}
            </div>
          </div>

          <div class="faq-item">
            <h3 style="margin:0 0 6px;">Honest reviews</h3>
            <form id="reviewForm" class="review-form">
              <input id="reviewName" placeholder="Name (optional)">
              <textarea id="reviewText" rows="3" placeholder="Write your review"></textarea>
              <button type="submit" class="btn">Submit review</button>
            </form>
            <div id="reviewsList" style="margin-top:8px;">${reviews.length ? reviews.slice().reverse().map((r) => `<article style="border-top:1px solid var(--border-soft);padding-top:8px;margin-top:8px;"><strong>${r.name || 'Anonymous'}</strong><p style="margin:4px 0 0;color:var(--ink-soft);">${r.text}</p></article>`).join('') : '<p style="color:var(--ink-soft);">No reviews yet.</p>'}</div>
          </div>
        `;
        container.appendChild(info);

        const quizArea = document.createElement('div');
        quizArea.id = 'quizArea';
        info.appendChild(quizArea);

        const topicSelect = document.getElementById('topicSelect');
        const resultBox = document.getElementById('resultBox');
        const loadingState = document.getElementById('loadingState');
        const showLoading = (flag) => loadingState.classList.toggle('show', flag);

        document.getElementById('quizBtn')?.addEventListener('click', async () => {
          const quizArea = document.getElementById('quizArea');
          try {
            showLoading(true);
            resultBox.textContent = '';
            quizArea.innerHTML = '';
            const chapter = topicSelect.value;
            const questions = await postJson('/api/quiz', {
              subject: book.subject,
              chapter,
              bookContext: book.title,
              count: 5,
              askedQuestions: [],
            });
            const list = Array.isArray(questions) ? questions : [];
            if (!list.length) { quizArea.textContent = 'No quiz generated.'; return; }
            renderInteractiveQuiz(list, book, chapter, quizArea);
          } catch (error) {
            quizArea.textContent = error.message;
          } finally {
            showLoading(false);
          }
        });

        document.getElementById('flashBtn')?.addEventListener('click', async () => {
          try {
            showLoading(true);
            resultBox.textContent = '';
            const chapter = topicSelect.value;
            const data = await postJson('/api/book-flashcards', {
              subject: book.subject,
              chapter,
              bookContext: book.title,
            });
            const cards = data.cards || [];
            appendGeneratedFlashcards(cards, book.title);
            resultBox.textContent = cards.map((card, i) => `${i + 1}. ${card.front} -> ${card.back}`).join('\n\n') || 'No flashcards generated.';
          } catch (error) {
            resultBox.textContent = error.message;
          } finally {
            showLoading(false);
          }
        });

        document.getElementById('paperBtn')?.addEventListener('click', async () => {
          try {
            showLoading(true);
            resultBox.textContent = '';
            const chapter = topicSelect.value;
            const data = await postJson('/api/guess-paper', {
              plan: getPlan(),
              section: book.section,
              subject: book.subject,
              chapter,
              paperFormat: '60 minutes',
            });
            resultBox.textContent = data.paper || 'No paper generated.';
          } catch (error) {
            resultBox.textContent = error.message;
          } finally {
            showLoading(false);
          }
        });

        document.getElementById('chapterNotesBtn')?.addEventListener('click', async () => {
          const notesArea = document.getElementById('notesArea') || (() => {
            const div = document.createElement('div');
            div.id = 'notesArea';
            resultBox.parentNode.insertBefore(div, resultBox);
            return div;
          })();
          try {
            showLoading(true);
            notesArea.innerHTML = '';
            resultBox.textContent = '';
            const chapter = topicSelect.value;
            const data = await postJson('/api/chapter-notes', {
              subject: book.subject,
              chapter,
              bookContext: book.title,
              userLevel: lsGet('mm_level', 'Newbie'),
            });
            renderChapterNotes(data.notes, data.engine, chapter || book.subject, notesArea);
          } catch (error) {
            notesArea.textContent = error.message;
          } finally {
            showLoading(false);
          }
        });

        document.getElementById('studyPlanBtn')?.addEventListener('click', () => {
          const dateInput = prompt('Enter exam date (YYYY-MM-DD):');
          if (!dateInput) return;
          const examDate = new Date(dateInput);
          if (Number.isNaN(examDate.getTime())) {
            resultBox.textContent = 'Invalid date format.';
            return;
          }
          const now = new Date();
          const days = Math.max(1, Math.ceil((examDate - now) / 86400000));
          const topics = (book.topics || []).length ? book.topics : [book.subject];
          const plan = [];
          for (let i = 0; i < days; i += 1) {
            const day = new Date(now.getTime() + i * 86400000);
            const topic = topics[i % topics.length];
            plan.push({ date: day.toISOString().slice(0, 10), topic, bookId: book.id, bookTitle: book.title });
          }
          const existing = lsGet('mm_study_plans', []);
          lsSet('mm_study_plans', existing.concat(plan).slice(-400));
          resultBox.textContent = `Study plan saved with ${plan.length} day entries.`;
        });

        document.getElementById('compareBooksBtn')?.addEventListener('click', async () => {
          try {
            showLoading(true);
            const compareTitles = similar.map((s) => s.title).join(', ') || 'none';
            const data = await postJson('/api/chat', {
              visitorId: getSessionId(),
              subject: book.subject,
              message: `In 3 short bullets, compare ${book.title} with these similar books: ${compareTitles}. Keep it practical for students.`
            });
            resultBox.textContent = data.reply || 'No comparison generated.';
          } catch (error) {
            resultBox.textContent = error.message;
          } finally {
            showLoading(false);
          }
        });

        document.getElementById('reviewForm')?.addEventListener('submit', (event) => {
          event.preventDefault();
          const name = document.getElementById('reviewName').value.trim();
          const text = document.getElementById('reviewText').value.trim();
          if (!text) return;
          saveReview(book.id, { name, text, createdAt: new Date().toISOString() });
          renderBook(book, allBooks);
        });

        refreshTopBar();
      }
    })();
  </script>
</body>
</html>
