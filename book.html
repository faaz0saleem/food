<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex">
<title>Redirecting…</title>
<script>
  // Old ?id= product URL → new clean per-book page.
  var id = new URLSearchParams(location.search).get('id') || '';
  location.replace(id ? '/books/' + encodeURIComponent(id) : '/books');
</script>
<link rel="canonical" href="https://hungter.com/books">
</head>
<body><p style="font-family:sans-serif;padding:24px;">Redirecting to the book…</p></body>
</html>
