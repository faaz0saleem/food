<script>
(function () {
  ensureProfile();

  const chatInput = document.getElementById('chatInput');
  const messages = document.getElementById('messages');
  const welcomeScreen = document.getElementById('welcomeScreen');
  const sendButton = document.getElementById('sendButton');
  const attachButton = document.getElementById('attachButton');
  const fileInput = document.getElementById('fileInput');
  const attachmentTray = document.getElementById('attachmentTray');
  const modelBadge = document.getElementById('modelBadge');
  const topBar = document.getElementById('topBar');
  const micButton = document.getElementById('micButton');
  const stopButton = document.getElementById('stopButton');
  let typingIndicator = null;
  let selectedEngine = 'auto';
  let studyMode = lsGet('mm_study_mode', 'normal');
  let currentAbort = null;   // AbortController for the in-flight request
  let streamCancelled = false;
  const fallbackModel = 'llama-3.3-70b-versatile';

  // Persona directives prepended (invisibly) to the outgoing prompt.
  const STUDY_DIRECTIVES = {
    normal: '',
    eli5: 'Explain this as if I am a young child — very simple words, a friendly tone, and a everyday analogy. ',
    exam: 'Answer in an exam-focused way: concise, structured, with the key marking points and a worked model answer. ',
    socratic: 'Teach me using the Socratic method — instead of giving the full answer at once, ask me one guiding question at a time and build toward the answer. ',
  };
  let pendingQuestion = null;
  const MAX_ATTACHMENTS = 5;
  const MAX_ATTACHMENT_BYTES = 3 * 1024 * 1024;
  const MAX_TEXT_CHARS = 12000;
  const pendingAttachments = [];

  // ── Saved chat threads ────────────────────────────────────────────────────
  const CHAT_KEY = 'mm_chat_threads';
  let currentChatId = lsGet('mm_current_chat', '') || Convo.newId();
  lsSet('mm_current_chat', currentChatId);
  let historyDrawer = null;

  function currentThread() {
    return Convo.get(CHAT_KEY, currentChatId) || { id: currentChatId, title: '', subject: 'General', messages: [] };
  }
  function saveTurn(userText, aiReply, engine) {
    const t = currentThread();
    if (!t.title && userText) t.title = userText.slice(0, 48);
    t.subject = lsGet('mm_subject', 'General');
    t.messages = t.messages || [];
    t.messages.push({ role: 'user', content: userText });
    t.messages.push({ role: 'ai', content: aiReply, engine: engine || '' });
    if (t.messages.length > 60) t.messages = t.messages.slice(-60);
    Convo.save(CHAT_KEY, t);
    if (historyDrawer) historyDrawer.refresh();
  }
  function startNewChat() {
    currentChatId = Convo.newId();
    lsSet('mm_current_chat', currentChatId);
    messages.innerHTML = '';
    messages.style.display = 'none';
    welcomeScreen.style.display = '';
    welcomeScreen.classList.remove('hidden-perm');
    chatInput.value = '';
    chatInput.focus();
  }
  function openThread(id) {
    const t = Convo.get(CHAT_KEY, id);
    if (!t) return;
    currentChatId = id;
    lsSet('mm_current_chat', id);
    messages.innerHTML = '';
    (t.messages || []).forEach((m) => {
      if (m.role === 'user') appendMessage(m.content, 'user');
      else messages.appendChild(formatMessage(m.content, 'ai', m.engine, ''));
    });
    if ((t.messages || []).length) {
      welcomeScreen.style.display = 'none';
      welcomeScreen.classList.add('hidden-perm');
      messages.style.display = 'flex';
      messages.scrollTop = messages.scrollHeight;
    }
  }

  function normalizeBase(rawBase) {
    const raw = String(rawBase || '').trim();
    if (!raw) return '';
    return raw.replace(/\/$/, '');
  }

  function isProductionHost() {
    const host = String(window.location.hostname || '').toLowerCase();
    return host && host !== 'localhost' && host !== '127.0.0.1';
  }

  function baseLooksLocal(base) {
    return /^https?:\/\/(localhost|127\.0\.0\.1)(:\d+)?$/i.test(base);
  }

  function resolveApiBases() {
    const configuredGlobal = normalizeBase(window.HUNGTER_API_BASE || '');
    const stored = normalizeBase(localStorage.getItem('mm_api_base'));
    const bases = [];

    if (configuredGlobal) {
      bases.push(configuredGlobal);
    }

    if (stored && !(isProductionHost() && baseLooksLocal(stored))) {
      bases.push(stored);
    } else if (stored && isProductionHost() && baseLooksLocal(stored)) {
      localStorage.removeItem('mm_api_base');
    }

    // Same-origin API route (works when backend is behind the same domain).
    bases.push('');
    // Netlify direct function path fallback.
    bases.push('/.netlify/functions');

    return [...new Set(bases)];
  }

  function joinApi(base, path) {
    const cleanPath = String(path || '').startsWith('/') ? path : `/${path}`;
    if (!base) return cleanPath;
    return `${base}${cleanPath}`;
  }

  function buildPathVariants(path) {
    const cleanPath = String(path || '').startsWith('/') ? String(path) : `/${path}`;
    const variants = [cleanPath];
    if (cleanPath.startsWith('/api/')) {
      variants.push(`${cleanPath}.php`);
    }
    return [...new Set(variants)];
  }

  async function fetchWithApiFallback(path, fetchOptions) {
    const bases = resolveApiBases();
    const paths = buildPathVariants(path);
    let lastError = null;

    for (const base of bases) {
      for (const candidatePath of paths) {
        const url = joinApi(base, candidatePath);
        try {
          const response = await fetch(url, fetchOptions);
          // Any JSON response is a real backend answer (including its error
          // messages) — only keep hunting on network errors or HTML 404 pages.
          const contentType = String(response.headers.get('content-type') || '');
          if (response.ok || contentType.includes('application/json')) {
            return { response, resolvedBase: base };
          }
          lastError = new Error(`HTTP ${response.status}`);
        } catch (error) {
          lastError = error;
        }
      }
    }

    throw lastError || new Error('API request failed');
  }

  function getDemoTutorReply(prompt, subject) {
    const text = (prompt || '').trim();
    if (!text) return 'Tell me what you are learning, and I will help you with a simple explanation.';
    return `Demo mode: Let's break down ${subject || 'this topic'} step by step. ${text.slice(0, 120)}. Start by identifying the main idea, then try one worked example, and finally explain it back in your own words.`;
  }

  function bytesToLabel(size) {
    const bytes = Number(size || 0);
    if (!Number.isFinite(bytes) || bytes <= 0) return '0 B';
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
    return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
  }

  function renderAttachmentTray() {
    if (!attachmentTray) return;
    if (!pendingAttachments.length) {
      attachmentTray.innerHTML = '';
      attachmentTray.style.display = 'none';
      return;
    }

    attachmentTray.style.display = 'flex';
    attachmentTray.innerHTML = pendingAttachments
      .map((attachment, index) => `
        <div class="attachment-chip">
          <span class="attachment-chip-label" title="${attachment.name}">${attachment.kind === 'image' ? '🖼' : '📄'} ${attachment.name} (${bytesToLabel(attachment.size)})</span>
          <button type="button" class="attachment-chip-remove" data-remove-index="${index}" aria-label="Remove ${attachment.name}">×</button>
        </div>
      `)
      .join('');

    attachmentTray.querySelectorAll('[data-remove-index]').forEach((button) => {
      button.addEventListener('click', () => {
        const index = Number(button.getAttribute('data-remove-index'));
        if (Number.isNaN(index)) return;
        pendingAttachments.splice(index, 1);
        renderAttachmentTray();
      });
    });
  }

  async function readFileAsText(file) {
    const text = await file.text();
    return String(text || '').slice(0, MAX_TEXT_CHARS);
  }

  async function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ''));
      reader.onerror = () => reject(new Error('Could not read image file.'));
      reader.readAsDataURL(file);
    });
  }

  function fileLooksTextual(file) {
    const type = String(file.type || '').toLowerCase();
    const name = String(file.name || '').toLowerCase();
    if (type.startsWith('text/')) return true;
    return ['.txt', '.md', '.csv', '.json', '.js', '.ts', '.py', '.java', '.c', '.cpp', '.html', '.css'].some((ext) => name.endsWith(ext));
  }

  async function addFiles(files) {
    if (!files || !files.length) return;

    for (const file of files) {
      if (pendingAttachments.length >= MAX_ATTACHMENTS) break;
      if (file.size > MAX_ATTACHMENT_BYTES) {
        appendMessage(`Skipped ${file.name}: file is larger than 3 MB.`, 'ai', 'System');
        continue;
      }

      try {
        const entry = {
          name: file.name,
          size: file.size,
          type: file.type || 'application/octet-stream',
          kind: file.type && file.type.startsWith('image/') ? 'image' : 'file',
        };

        if (entry.kind === 'image') {
          entry.imageDataUrl = await readFileAsDataUrl(file);
        } else if (fileLooksTextual(file)) {
          entry.textContent = await readFileAsText(file);
        }

        pendingAttachments.push(entry);
      } catch {
        appendMessage(`Could not read ${file.name}. Try a different file.`, 'ai', 'System');
      }
    }

    renderAttachmentTray();
    fileInput.value = '';
  }

  function getConversationHistory() {
    // Context comes from the current saved thread, so continuing a past chat
    // keeps its memory and each thread stays independent.
    const t = currentThread();
    return (t.messages || [])
      .slice(-12)
      .map((m) => {
        const content = String(m.content || '').trim();
        if (!content) return null;
        return { role: m.role === 'user' ? 'user' : 'assistant', content };
      })
      .filter(Boolean);
  }

  function consumeAttachments() {
    const snapshot = pendingAttachments.splice(0, pendingAttachments.length);
    renderAttachmentTray();
    return snapshot;
  }

  function refreshTopBar() {
    const progress = getLevelProgress();
    if (topBar) topBar.style.width = `${progress.pct}%`;
  }

  // ── Markdown + Math rendering ───────────────────────────────────────────
  function renderMarkdownMath(text) {
    if (!text) return '';
    const mathMap = {};
    let idx = 0;
    let processed = String(text);

    if (typeof katex !== 'undefined') {
      // Display math $$...$$
      processed = processed.replace(/\$\$([\s\S]+?)\$\$/g, (_, expr) => {
        const key = `__MD${idx++}__`;
        try { mathMap[key] = katex.renderToString(expr.trim(), { displayMode: true, throwOnError: false }); }
        catch { mathMap[key] = `<code>${expr}</code>`; }
        return key;
      });
      // Inline math $...$  (skip inside backtick/code spans)
      processed = processed.replace(/(?<!`|\$)\$([^$\n]{1,200}?)\$(?!`|\$)/g, (_, expr) => {
        const key = `__MI${idx++}__`;
        try { mathMap[key] = katex.renderToString(expr.trim(), { displayMode: false, throwOnError: false }); }
        catch { mathMap[key] = `<code>${expr}</code>`; }
        return key;
      });
    }

    let html;
    if (typeof marked !== 'undefined') {
      marked.use({ breaks: true, gfm: true, mangle: false, headerIds: false });
      html = marked.parse(processed);
    } else {
      html = processed
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    for (const [key, value] of Object.entries(mathMap)) {
      html = html.split(key).join(value);
    }

    // AI output can be steered by user prompts, so treat it as untrusted
    // before it ever reaches innerHTML.
    if (typeof DOMPurify !== 'undefined') {
      html = DOMPurify.sanitize(html, {
        ADD_TAGS: ['math', 'semantics', 'mrow', 'mi', 'mo', 'mn', 'msup', 'msub', 'mfrac', 'annotation'],
        ADD_ATTR: ['xmlns', 'encoding'],
      });
    }
    return html;
  }

  let __mermaidReady = false;
  function initMermaid() {
    if (__mermaidReady || typeof mermaid === 'undefined') return;
    try { mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'strict' }); __mermaidReady = true; } catch {}
  }

  // After AI markdown is in the DOM: render ```mermaid diagrams and add a Copy
  // button to every code block.
  async function enhanceRendered(container) {
    if (!container) return;
    container.querySelectorAll('pre > code').forEach((code) => {
      const pre = code.parentElement;
      if (pre.dataset.copyReady || /language-mermaid/.test(code.className)) return;
      pre.dataset.copyReady = '1';
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'code-copy';
      btn.textContent = 'Copy';
      btn.addEventListener('click', async () => {
        try { await navigator.clipboard.writeText(code.textContent || ''); btn.textContent = 'Copied ✓'; setTimeout(() => { btn.textContent = 'Copy'; }, 1400); } catch {}
      });
      pre.appendChild(btn);
    });
    const blocks = container.querySelectorAll('code.language-mermaid');
    if (blocks.length && typeof mermaid !== 'undefined') {
      initMermaid();
      for (const code of blocks) {
        const pre = code.parentElement;
        if (!pre || pre.dataset.mermaidDone) continue;
        pre.dataset.mermaidDone = '1';
        try {
          const { svg } = await mermaid.render('mmd' + Math.random().toString(36).slice(2, 8), code.textContent || '');
          const holder = document.createElement('div');
          holder.className = 'mermaid-diagram';
          holder.innerHTML = svg;
          pre.replaceWith(holder);
        } catch { /* leave the code as-is if the diagram is invalid */ }
      }
    }
  }

  // Shared action row for AI messages (read / copy / regenerate / explain).
  function buildActions(text, engine, sourcePrompt) {
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    const mk = (label, fn) => {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'msg-action-btn'; b.textContent = label;
      b.addEventListener('click', fn); actions.appendChild(b); return b;
    };
    mk('🔊 Read aloud', () => {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text); u.rate = 0.95; u.pitch = 1;
      window.speechSynthesis.speak(u);
    });
    const copyBtn = mk('⧉ Copy', async () => {
      try { await navigator.clipboard.writeText(text); copyBtn.textContent = 'Copied ✓'; setTimeout(() => { copyBtn.textContent = '⧉ Copy'; }, 1400); } catch {}
    });
    if (sourcePrompt) {
      mk('↻ Regenerate', () => sendMessage(sourcePrompt, { regenerate: true }));
      mk('Explain differently', () => sendMessage(sourcePrompt, { excludeEngine: String(engine || '').split(',')[0].trim() }));
      mk('Explain it back (+XP)', () => explainItBack(sourcePrompt, text));
    }
    return actions;
  }

  // Follow-up suggestion chips that keep the conversation moving.
  function buildFollowups(subject) {
    const wrap = document.createElement('div');
    wrap.className = 'followups';
    const chips = [
      ['💡 Give an example', 'Give me a concrete example of that.'],
      ['🔤 Explain simpler', 'Explain that again in much simpler words.'],
      ['🔬 Go deeper', 'Go deeper and explain the why behind that.'],
      ['🧪 Quiz me', null],
    ];
    chips.forEach(([label, prompt]) => {
      const c = document.createElement('button');
      c.type = 'button'; c.className = 'followup-chip'; c.textContent = label;
      c.addEventListener('click', () => {
        if (prompt) sendMessage(prompt);
        else window.location.href = '/quiz.html?subject=' + encodeURIComponent(subject || lsGet('mm_subject', 'General'));
      });
      wrap.appendChild(c);
    });
    return wrap;
  }

  function formatMessage(text, sender, engine, sourcePrompt) {
    const row = document.createElement('div');
    row.className = `msg-row ${sender}`;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = sender === 'ai' ? '🧠' : '🙂';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (sender === 'ai' && engine) {
      const tag = document.createElement('div');
      tag.className = 'engine-tag';
      tag.textContent = engine;
      bubble.appendChild(tag);
    }
    const textNode = document.createElement('div');
    textNode.className = 'msg-text';
    if (sender === 'ai') {
      textNode.innerHTML = renderMarkdownMath(text);
    } else {
      textNode.textContent = text;
    }
    bubble.appendChild(textNode);
    if (sender === 'ai') {
      bubble.appendChild(buildActions(text, engine, sourcePrompt));
      if (sourcePrompt) bubble.appendChild(buildFollowups(lsGet('mm_subject', 'General')));
      enhanceRendered(textNode);
    }
    row.appendChild(avatar);
    row.appendChild(bubble);
    return row;
  }

  function appendMessage(text, sender, engine, sourcePrompt) {
    if (!welcomeScreen.classList.contains('hidden-perm')) {
      welcomeScreen.style.display = 'none';
      welcomeScreen.classList.add('hidden-perm');
    }
    messages.style.display = 'flex';
    if (typingIndicator) {
      typingIndicator.remove();
      typingIndicator = null;
    }
    messages.appendChild(formatMessage(text, sender, engine, sourcePrompt));
    messages.scrollTop = messages.scrollHeight;
    document.getElementById('chatFeed').scrollTop = document.getElementById('chatFeed').scrollHeight;
  }

  // Streaming (progressive character reveal) for AI responses
  async function appendStreamingMessage(fullText, sender, engine, sourcePrompt) {
    if (!welcomeScreen.classList.contains('hidden-perm')) {
      welcomeScreen.style.display = 'none';
      welcomeScreen.classList.add('hidden-perm');
    }
    messages.style.display = 'flex';
    if (typingIndicator) { typingIndicator.remove(); typingIndicator = null; }

    const row = document.createElement('div');
    row.className = `msg-row ${sender}`;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = sender === 'ai' ? '🧠' : '🙂';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (sender === 'ai' && engine) {
      const tag = document.createElement('div');
      tag.className = 'engine-tag';
      tag.textContent = engine;
      bubble.appendChild(tag);
    }
    const textEl = document.createElement('div');
    textEl.className = 'msg-text';
    bubble.appendChild(textEl);
    row.appendChild(avatar);
    row.appendChild(bubble);
    messages.appendChild(row);
    const feed = document.getElementById('chatFeed');

    // Reveal characters in chunks for a streaming feel
    const CHUNK = 5;
    const TICK = 14;
    let i = 0;
    while (i < fullText.length) {
      if (streamCancelled) { i = fullText.length; break; }
      i = Math.min(i + CHUNK, fullText.length);
      const partial = fullText.slice(0, i);
      if (sender === 'ai') {
        textEl.innerHTML = renderMarkdownMath(partial) + (i < fullText.length ? '<span class="stream-cursor">▋</span>' : '');
      } else {
        textEl.textContent = partial;
      }
      messages.scrollTop = messages.scrollHeight;
      if (feed) feed.scrollTop = feed.scrollHeight;
      await new Promise((r) => setTimeout(r, TICK));
    }

    // Final clean render
    if (sender === 'ai') {
      textEl.innerHTML = renderMarkdownMath(fullText);
      bubble.appendChild(buildActions(fullText, engine, sourcePrompt));
      if (sourcePrompt) bubble.appendChild(buildFollowups(lsGet('mm_subject', 'General')));
      enhanceRendered(textEl);
    } else {
      textEl.textContent = fullText;
    }
    messages.scrollTop = messages.scrollHeight;
    if (feed) feed.scrollTop = feed.scrollHeight;
  }

  function showTyping() {
    if (typingIndicator) return;
    typingIndicator = document.createElement('div');
    typingIndicator.className = 'msg-row ai';
    typingIndicator.innerHTML = `
      <div class="msg-avatar">🧠</div>
      <div class="msg-bubble"><span class="typing-dots"><span></span><span></span><span></span></span></div>
    `;
    messages.appendChild(typingIndicator);
    document.getElementById('chatFeed').scrollTop = document.getElementById('chatFeed').scrollHeight;
  }

  async function loadModelInfo() {
    try {
      const { response } = await fetchWithApiFallback('/api/status');
      const data = await response.json();
      const engines = data?.engines || {};
      const liveCount = Object.values(engines).filter(Boolean).length;
      modelBadge.textContent = liveCount
        ? `${liveCount} of 4 engines live — routed automatically per question`
        : `Model: ${data?.model || fallbackModel}`;
    } catch (error) {
      modelBadge.textContent = 'Backend offline — configure API endpoint and keys';
    }
  }

  async function fetchAIResponse(prompt, subject, options = {}) {
    try {
      const history = getConversationHistory();
      const attachments = options.attachments || [];
      const { response } = await fetchWithApiFallback('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: options.signal,
        body: JSON.stringify({
          visitorId: getSessionId(),
          subject,
          learningStyle: lsGet('mm_style', 'Visual'),
          userLevel: lsGet('mm_level', 'Newbie'),
          message: prompt,
          engineMode: options.engineMode || selectedEngine,
          excludeEngine: options.excludeEngine || undefined,
          history,
          attachments,
        }),
      });
      const data = await response.json();
      if (response.status === 429) {
        return { reply: data.error || "You're sending messages too quickly. Please wait a moment.", engine: null };
      }

      if (!response.ok) {
        return {
          reply: data.error || 'Could not reach the AI service. Check your hosting API route and environment variables.',
          engine: 'System',
        };
      }

      if (data.fallback && data.ownerHint) {
        console.warn('Hungter AI fallback active:', data.ownerHint);
      }
      return {
        reply: data.reply || "Sorry, I couldn't generate a response right now.",
        engine: data.engine || null,
        ownerHint: data.fallback ? String(data.ownerHint || '') : '',
        credits: data.credits || null,
        payg: !!data.payg,
      };
    } catch (error) {
      return {
        reply: "I couldn't reach the tutor server just now — give it a few seconds and try again. If this keeps happening, the site owner should check that /api/chat is reachable and GROQ_API_KEY is set on the server.",
        engine: 'System'
      };
    }
  }

  async function explainItBack(concept, aiReply) {
    const explanation = window.prompt('Explain this concept back in your own words. If your explanation is clear, you earn +20 XP bonus.');
    if (!explanation || !String(explanation).trim()) return;

    const conceptText = String(concept || aiReply || 'Concept').slice(0, 220);

    try {
      const { response } = await fetchWithApiFallback('/api/explain-check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          concept: conceptText,
          studentExplanation: explanation,
        }),
      });
      const data = await response.json();
      const feedback = String(data?.feedback || 'Nice effort. Keep practicing your own explanation style.');
      const understood = Boolean(data?.understood);
      recordExplainCheck(conceptText, explanation, feedback, understood);
      appendMessage(`Explain-check feedback: ${feedback}\nBonus XP awarded: ${understood ? '+20' : '+0'}`, 'ai', 'Coach');
      refreshTopBar();
    } catch {
      appendMessage('Explain-check is unavailable right now. Try again in a moment.', 'ai', 'System');
    }
  }

  async function sendMessage(overrideText, options = {}) {
    const text = (overrideText || chatInput.value || '').trim();
    const attachments = Array.isArray(options.attachments) ? options.attachments : consumeAttachments();
    if (!text) return;
    const subject = lsGet('mm_subject', 'General');
    const attachmentNote = attachments.length
      ? `\n\nAttached: ${attachments.map((item) => item.name).join(', ')}`
      : '';
    if (!options.regenerate) appendMessage(`${text}${attachmentNote}`, 'user');
    chatInput.value = '';
    showTyping();
    setGenerating(true);
    streamCancelled = false;
    const controller = new AbortController();
    currentAbort = controller;
    // Persona/study-mode directive is prepended to what the AI sees, but the
    // saved thread + on-screen bubble keep the student's clean text.
    const directive = STUDY_DIRECTIVES[studyMode] || '';
    const { reply, engine, ownerHint, credits, payg } = await fetchAIResponse(directive + text, subject, { ...options, attachments, signal: controller.signal });
    if (credits && modelBadge) {
      modelBadge.textContent = payg
        ? `Pay-as-you-go · $${credits.paygPerCredit}/credit (${credits.plan})`
        : `${credits.left} credits left today · ${credits.plan} plan`;
    }
    if (typingIndicator) {
      typingIndicator.remove();
      typingIndicator = null;
    }
    if (streamCancelled) { setGenerating(false); currentAbort = null; return; }
    await appendStreamingMessage(reply, 'ai', engine, text);
    if (ownerHint) {
      appendMessage(`⚠️ AI engines are offline — reason: ${ownerHint}\nOwner fix: open /api/setup.php · Full self-check: /api/diag.php`, 'ai', 'System');
    }
    recordConversation(subject, text, reply);
    saveTurn(text, reply, engine);
    recordChat(subject);
    refreshTopBar();
    setGenerating(false);
    currentAbort = null;
  }

  function setGenerating(on) {
    if (sendButton) sendButton.style.display = on ? 'none' : '';
    if (stopButton) stopButton.style.display = on ? 'inline-flex' : 'none';
  }

  function updateEngineButtons() {
    document.querySelectorAll('.engine-btn').forEach((btn) => {
      if (btn.dataset.engine === selectedEngine) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
  }

  document.querySelectorAll('.engine-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      selectedEngine = btn.dataset.engine;
      updateEngineButtons();
    });
  });

  document.querySelectorAll('.quick-prompt-card').forEach((card) => {
    card.addEventListener('click', () => {
      chatInput.value = card.dataset.prompt;
      sendMessage();
    });
  });

  updateEngineButtons();

  chatInput.addEventListener('keypress', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      sendMessage();
    }
  });

  // Pass no arguments — the click event must not become overrideText.
  sendButton.addEventListener('click', () => sendMessage());
  attachButton?.addEventListener('click', () => fileInput?.click());
  fileInput?.addEventListener('change', async (event) => {
    await addFiles(Array.from(event.target.files || []));
  });

  // Study-mode (persona) selector.
  document.querySelectorAll('.study-btn').forEach((btn) => {
    if (btn.dataset.mode === studyMode) btn.classList.add('active'); else btn.classList.remove('active');
    btn.addEventListener('click', () => {
      studyMode = btn.dataset.mode;
      lsSet('mm_study_mode', studyMode);
      document.querySelectorAll('.study-btn').forEach((b) => b.classList.toggle('active', b === btn));
    });
  });

  // Stop generating.
  stopButton?.addEventListener('click', () => {
    streamCancelled = true;
    if (currentAbort) { try { currentAbort.abort(); } catch {} }
    if (typingIndicator) { typingIndicator.remove(); typingIndicator = null; }
    setGenerating(false);
  });

  // Voice input (Web Speech API) — only shown when the browser supports it.
  (function setupVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR || !micButton) return;
    micButton.style.display = 'inline-flex';
    let rec = null, listening = false;
    micButton.addEventListener('click', () => {
      if (listening && rec) { rec.stop(); return; }
      rec = new SR();
      rec.lang = navigator.language || 'en-US';
      rec.interimResults = true;
      rec.continuous = false;
      let finalText = '';
      rec.onstart = () => { listening = true; micButton.classList.add('listening'); micButton.textContent = '⏺'; };
      rec.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) finalText += t; else interim += t;
        }
        chatInput.value = (finalText + interim).trim();
      };
      rec.onerror = () => {};
      rec.onend = () => {
        listening = false; micButton.classList.remove('listening'); micButton.textContent = '🎤';
        if (chatInput.value.trim()) sendMessage();
      };
      rec.start();
    });
  })();
  const params = new URLSearchParams(window.location.search);
  pendingQuestion = params.get('q');
  if (pendingQuestion) {
    chatInput.value = pendingQuestion;
  }
  loadModelInfo();
  refreshTopBar();
  try { chatInput.focus(); } catch {}

  // History drawer + restore the last open thread (unless arriving with ?q=).
  historyDrawer = Convo.mountDrawer({
    key: CHAT_KEY,
    title: '💬 Your chats',
    newLabel: '＋ New chat',
    onNew: startNewChat,
    onSelect: openThread,
    itemLabel: (t) => ({ title: t.title || 'Untitled chat', sub: (t.subject ? t.subject + ' · ' : '') + Convo.ago(t.updatedAt) }),
  });
  if (!pendingQuestion) openThread(currentChatId);

  // PWA install prompt — shown as a small button when browser supports it
  let _deferredInstall = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    _deferredInstall = e;
    const btn = document.getElementById('pwaInstallBtn');
    if (btn) btn.style.display = 'inline-flex';
  });
  document.getElementById('pwaInstallBtn')?.addEventListener('click', async () => {
    if (!_deferredInstall) return;
    _deferredInstall.prompt();
    const { outcome } = await _deferredInstall.userChoice;
    _deferredInstall = null;
    if (outcome === 'accepted') document.getElementById('pwaInstallBtn').style.display = 'none';
  });
})();
</script>

<script>
// Service Worker registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
