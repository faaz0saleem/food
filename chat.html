<!DOCTYPE html>
<html lang="en">
<head>
<!-- BASE_URL: https://YOUR_DOMAIN_HERE -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungter — Chat</title>
<meta name="description" content="Ask Hungter's AI tutor anything — explanations tuned to how you learn.">
<link rel="canonical" href="https://YOUR_DOMAIN_HERE/chat.html">
<meta property="og:type" content="website">
<meta property="og:title" content="Hungter — Chat">
<meta property="og:description" content="Ask Hungter's AI tutor anything — explanations tuned to how you learn.">
<meta property="og:image" content="/favicon.svg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Hungter — Chat">
<meta name="twitter:description" content="Ask Hungter's AI tutor anything — explanations tuned to how you learn.">
<meta name="twitter:image" content="/favicon.svg">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/brand.css">
<link rel="stylesheet" href="/nav.css">
<link rel="stylesheet" href="/chat.css">
</head>
<body data-page="chat" style="display:flex;flex-direction:column;min-height:100vh;">
<div class="top-bar"><div class="top-bar-fill" id="topBar" style="width:0%"></div></div>
<header class="site-nav"></header>

<main style="flex:1;display:flex;flex-direction:column;min-height:0;">
  <div class="chat-shell">
    <div id="chatFeed" class="chat-feed">
      <div id="welcomeScreen" class="chat-welcome">
        <div>
          <div class="eyebrow" style="justify-content:center;">Ask AI</div>
          <h1>What shall we explore today?</h1>
          <p>Ask anything from study tips to concept walkthroughs. Use a quick prompt or type your own question below.</p>
        </div>
        <div class="quick-prompt-grid">
          <button type="button" class="quick-prompt-card" data-prompt="Explain the physics of light.">
            <strong>Physics</strong>
            <span>Explain the physics of light.</span>
          </button>
          <button type="button" class="quick-prompt-card" data-prompt="Write a poem about neural networks.">
            <strong>Creative</strong>
            <span>Write a poem about neural networks.</span>
          </button>
          <button type="button" class="quick-prompt-card" data-prompt="Summarize this lesson in simple steps.">
            <strong>Summary</strong>
            <span>Summarize this lesson in simple steps.</span>
          </button>
          <button type="button" class="quick-prompt-card" data-prompt="Give me three example problems and solutions.">
            <strong>Practice</strong>
            <span>Give me three example problems and solutions.</span>
          </button>
        </div>
      </div>

      <div id="messages" class="chat-messages" style="display:none;"></div>
    </div>

    <div class="chat-composer">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
        <div id="modelBadge" class="model-badge">Model: loading…</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <button id="roundtableToggle" type="button" class="msg-action-btn">Roundtable: OFF</button>
          <a href="/roundchat.html" class="msg-action-btn" style="text-decoration:none;">Open RoundChat page</a>
        </div>
      </div>
      <div class="composer-row">
        <button id="attachButton" class="attach-btn" type="button" aria-label="Attach file or image" title="Attach file or image">+</button>
        <input id="fileInput" type="file" accept="image/*,.pdf,.txt,.md,.csv,.json,.js,.ts,.py,.java,.c,.cpp,.html,.css" multiple hidden />
        <input id="chatInput" type="text" placeholder="Analyze, create, or learn..." autocomplete="off" />
        <button id="sendButton" class="send-btn" type="button" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
      <div id="attachmentTray" class="attachment-tray" aria-live="polite"></div>
      <p class="composer-note">Hungter can make mistakes. Verify important information and use prompts responsibly.</p>
    </div>
  </div>
</main>

<script src="/api-config.js"></script>
<script src="/script.js"></script>
<script src="/layout.js" defer></script>
<script>
(function () {
  ensureProfile();

  const chatInput = document.getElementById('chatInput');
  const messages = document.getElementById('messages');
  const welcomeScreen = document.getElementById('welcomeScreen');
  const sendButton = document.getElementById('sendButton');
  const attachButton = document.getElementById('attachButton');
  const fileInput = document.getElementById('fileInput');
  const attachmentTray = document.getElementById('attachmentTray');
  const modelBadge = document.getElementById('modelBadge');
  const roundtableToggle = document.getElementById('roundtableToggle');
  const topBar = document.getElementById('topBar');
  let typingIndicator = null;
  let stageIndicator = null;
  let roundtableMode = false;
  const fallbackModel = 'llama-3.3-70b-versatile';
  let pendingQuestion = null;
  const MAX_ATTACHMENTS = 5;
  const MAX_ATTACHMENT_BYTES = 3 * 1024 * 1024;
  const MAX_TEXT_CHARS = 12000;
  const pendingAttachments = [];

  function normalizeBase(rawBase) {
    const raw = String(rawBase || '').trim();
    if (!raw) return '';
    return raw.replace(/\/$/, '');
  }

  function isProductionHost() {
    const host = String(window.location.hostname || '').toLowerCase();
    return host && host !== 'localhost' && host !== '127.0.0.1';
  }

  function baseLooksLocal(base) {
    return /^https?:\/\/(localhost|127\.0\.0\.1)(:\d+)?$/i.test(base);
  }

  function resolveApiBases() {
    const configuredGlobal = normalizeBase(window.HUNGTER_API_BASE || '');
    const stored = normalizeBase(localStorage.getItem('mm_api_base'));
    const bases = [];

    if (configuredGlobal) {
      bases.push(configuredGlobal);
    }

    if (stored && !(isProductionHost() && baseLooksLocal(stored))) {
      bases.push(stored);
    } else if (stored && isProductionHost() && baseLooksLocal(stored)) {
      localStorage.removeItem('mm_api_base');
    }

    // Same-origin API route (works when backend is behind the same domain).
    bases.push('');
    // Netlify direct function path fallback.
    bases.push('/.netlify/functions');

    return [...new Set(bases)];
  }

  function joinApi(base, path) {
    const cleanPath = String(path || '').startsWith('/') ? path : `/${path}`;
    if (!base) return cleanPath;
    return `${base}${cleanPath}`;
  }

  function buildPathVariants(path) {
    const cleanPath = String(path || '').startsWith('/') ? String(path) : `/${path}`;
    const variants = [cleanPath];
    if (cleanPath.startsWith('/api/')) {
      variants.push(`${cleanPath}.php`);
    }
    return [...new Set(variants)];
  }

  async function fetchWithApiFallback(path, fetchOptions) {
    const bases = resolveApiBases();
    const paths = buildPathVariants(path);
    let lastError = null;

    for (const base of bases) {
      for (const candidatePath of paths) {
        const url = joinApi(base, candidatePath);
        try {
          const response = await fetch(url, fetchOptions);
          if (response.ok || response.status === 429 || response.status === 400 || response.status === 401 || response.status === 403) {
            return { response, resolvedBase: base };
          }
          lastError = new Error(`HTTP ${response.status}`);
        } catch (error) {
          lastError = error;
        }
      }
    }

    throw lastError || new Error('API request failed');
  }

  function getDemoTutorReply(prompt, subject) {
    const text = (prompt || '').trim();
    if (!text) return 'Tell me what you are learning, and I will help you with a simple explanation.';
    return `Demo mode: Let's break down ${subject || 'this topic'} step by step. ${text.slice(0, 120)}. Start by identifying the main idea, then try one worked example, and finally explain it back in your own words.`;
  }

  function bytesToLabel(size) {
    const bytes = Number(size || 0);
    if (!Number.isFinite(bytes) || bytes <= 0) return '0 B';
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
    return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
  }

  function renderAttachmentTray() {
    if (!attachmentTray) return;
    if (!pendingAttachments.length) {
      attachmentTray.innerHTML = '';
      attachmentTray.style.display = 'none';
      return;
    }

    attachmentTray.style.display = 'flex';
    attachmentTray.innerHTML = pendingAttachments
      .map((attachment, index) => `
        <div class="attachment-chip">
          <span class="attachment-chip-label" title="${attachment.name}">${attachment.kind === 'image' ? '🖼' : '📄'} ${attachment.name} (${bytesToLabel(attachment.size)})</span>
          <button type="button" class="attachment-chip-remove" data-remove-index="${index}" aria-label="Remove ${attachment.name}">×</button>
        </div>
      `)
      .join('');

    attachmentTray.querySelectorAll('[data-remove-index]').forEach((button) => {
      button.addEventListener('click', () => {
        const index = Number(button.getAttribute('data-remove-index'));
        if (Number.isNaN(index)) return;
        pendingAttachments.splice(index, 1);
        renderAttachmentTray();
      });
    });
  }

  async function readFileAsText(file) {
    const text = await file.text();
    return String(text || '').slice(0, MAX_TEXT_CHARS);
  }

  async function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ''));
      reader.onerror = () => reject(new Error('Could not read image file.'));
      reader.readAsDataURL(file);
    });
  }

  function fileLooksTextual(file) {
    const type = String(file.type || '').toLowerCase();
    const name = String(file.name || '').toLowerCase();
    if (type.startsWith('text/')) return true;
    return ['.txt', '.md', '.csv', '.json', '.js', '.ts', '.py', '.java', '.c', '.cpp', '.html', '.css'].some((ext) => name.endsWith(ext));
  }

  async function addFiles(files) {
    if (!files || !files.length) return;

    for (const file of files) {
      if (pendingAttachments.length >= MAX_ATTACHMENTS) break;
      if (file.size > MAX_ATTACHMENT_BYTES) {
        appendMessage(`Skipped ${file.name}: file is larger than 3 MB.`, 'ai', 'System');
        continue;
      }

      try {
        const entry = {
          name: file.name,
          size: file.size,
          type: file.type || 'application/octet-stream',
          kind: file.type && file.type.startsWith('image/') ? 'image' : 'file',
        };

        if (entry.kind === 'image') {
          entry.imageDataUrl = await readFileAsDataUrl(file);
        } else if (fileLooksTextual(file)) {
          entry.textContent = await readFileAsText(file);
        }

        pendingAttachments.push(entry);
      } catch {
        appendMessage(`Could not read ${file.name}. Try a different file.`, 'ai', 'System');
      }
    }

    renderAttachmentTray();
    fileInput.value = '';
  }

  function getConversationHistory() {
    const currentSession = getSessionId();
    const conversations = lsGet('mm_conversations', []);
    return conversations
      .filter((item) => item && item.sessionId === currentSession)
      .slice(-10)
      .flatMap((item) => {
        const userMessage = String(item.userMessage || '').trim();
        const aiReply = String(item.aiReply || '').trim();
        const rows = [];
        if (userMessage) rows.push({ role: 'user', content: userMessage });
        if (aiReply) rows.push({ role: 'assistant', content: aiReply });
        return rows;
      });
  }

  function consumeAttachments() {
    const snapshot = pendingAttachments.splice(0, pendingAttachments.length);
    renderAttachmentTray();
    return snapshot;
  }

  function refreshTopBar() {
    const progress = getLevelProgress();
    if (topBar) topBar.style.width = `${progress.pct}%`;
  }

  function formatMessage(text, sender, engine, sourcePrompt) {
    const row = document.createElement('div');
    row.className = `msg-row ${sender}`;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = sender === 'ai' ? '🧠' : '🙂';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (sender === 'ai' && engine) {
      const tag = document.createElement('div');
      tag.className = 'engine-tag';
      tag.textContent = engine;
      bubble.appendChild(tag);
    }
    const textNode = document.createElement('div');
    textNode.textContent = text;
    bubble.appendChild(textNode);
    if (sender === 'ai') {
      const actions = document.createElement('div');
      actions.className = 'msg-actions';

      const readBtn = document.createElement('button');
      readBtn.type = 'button';
      readBtn.className = 'msg-action-btn';
      readBtn.textContent = '🔊 Read aloud';
      readBtn.addEventListener('click', () => {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.95;
        utter.pitch = 1;
        window.speechSynthesis.speak(utter);
      });
      actions.appendChild(readBtn);

      if (sourcePrompt) {
        const explainBtn = document.createElement('button');
        explainBtn.type = 'button';
        explainBtn.className = 'msg-action-btn';
        explainBtn.textContent = 'Explain differently';
        explainBtn.addEventListener('click', () => {
          sendMessage(sourcePrompt, { excludeEngine: String(engine || '').split(',')[0].trim() });
        });
        actions.appendChild(explainBtn);

        const explainBackBtn = document.createElement('button');
        explainBackBtn.type = 'button';
        explainBackBtn.className = 'msg-action-btn';
        explainBackBtn.textContent = 'Explain it back (+XP)';
        explainBackBtn.addEventListener('click', () => {
          explainItBack(sourcePrompt, text);
        });
        actions.appendChild(explainBackBtn);
      }
      bubble.appendChild(actions);
    }
    row.appendChild(avatar);
    row.appendChild(bubble);
    return row;
  }

  function appendMessage(text, sender, engine, sourcePrompt) {
    if (!welcomeScreen.classList.contains('hidden-perm')) {
      welcomeScreen.style.display = 'none';
      welcomeScreen.classList.add('hidden-perm');
    }
    messages.style.display = 'flex';
    if (typingIndicator) {
      typingIndicator.remove();
      typingIndicator = null;
    }
    messages.appendChild(formatMessage(text, sender, engine, sourcePrompt));
    messages.scrollTop = messages.scrollHeight;
    document.getElementById('chatFeed').scrollTop = document.getElementById('chatFeed').scrollHeight;
  }

  function showTyping() {
    if (typingIndicator) return;
    typingIndicator = document.createElement('div');
    typingIndicator.className = 'msg-row ai';
    typingIndicator.innerHTML = `
      <div class="msg-avatar">🧠</div>
      <div class="msg-bubble"><span class="typing-dots"><span></span><span></span><span></span></span></div>
    `;
    messages.appendChild(typingIndicator);
    document.getElementById('chatFeed').scrollTop = document.getElementById('chatFeed').scrollHeight;
  }

  function showStageIndicator(text) {
    if (!stageIndicator) {
      stageIndicator = document.createElement('div');
      stageIndicator.className = 'msg-row ai';
      stageIndicator.innerHTML = `
        <div class="msg-avatar">🧠</div>
        <div class="msg-bubble"><strong id="stageIndicatorText"></strong></div>
      `;
      messages.appendChild(stageIndicator);
    }
    const stageText = stageIndicator.querySelector('#stageIndicatorText');
    if (stageText) stageText.textContent = text;
    document.getElementById('chatFeed').scrollTop = document.getElementById('chatFeed').scrollHeight;
  }

  function hideStageIndicator() {
    if (!stageIndicator) return;
    stageIndicator.remove();
    stageIndicator = null;
  }

  async function loadModelInfo() {
    try {
      const { response } = await fetchWithApiFallback('/api/status');
      const data = await response.json();
      const engines = data?.engines || {};
      const liveCount = Object.values(engines).filter(Boolean).length;
      modelBadge.textContent = liveCount
        ? `${liveCount} of 4 engines live — routed automatically per question`
        : `Model: ${data?.model || fallbackModel}`;
    } catch (error) {
      modelBadge.textContent = 'Backend offline — configure API endpoint and keys';
    }
  }

  async function fetchAIResponse(prompt, subject, options = {}) {
    try {
      const history = getConversationHistory();
      const attachments = options.attachments || [];
      const { response } = await fetchWithApiFallback('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          visitorId: getSessionId(),
          subject,
          learningStyle: lsGet('mm_style', 'Visual'),
          userLevel: lsGet('mm_level', 'Newbie'),
          message: prompt,
          excludeEngine: options.excludeEngine || undefined,
          history,
          attachments,
        }),
      });
      const data = await response.json();
      if (response.status === 429) {
        return { reply: data.error || "You're sending messages too quickly. Please wait a moment.", engine: null };
      }

      if (!response.ok) {
        return {
          reply: data.error || 'Could not reach the AI service. Check your hosting API route and environment variables.',
          engine: 'System',
        };
      }

      return {
        reply: data.reply || "Sorry, I couldn't generate a response right now.",
        engine: data.engine || null,
      };
    } catch (error) {
      return {
        reply: 'Could not reach the AI backend. Your site needs a live /api/chat backend (same domain, Netlify functions, or a valid mm_api_base URL).',
        engine: 'System'
      };
    }
  }

  async function fetchRoundtableDebate(prompt, subject) {
    try {
      const { response } = await fetchWithApiFallback('/api/roundtable', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: prompt,
          subject,
          userLevel: lsGet('mm_level', 'Newbie'),
        }),
      });
      const data = await response.json();
      if (!response.ok || data?.error) {
        return { error: data?.error || 'Roundtable request failed.' };
      }
      return data;
    } catch {
      return { error: 'Could not reach the roundtable backend.' };
    }
  }

  function renderDebateResult(data, sourcePrompt) {
    const row = document.createElement('div');
    row.className = 'msg-row ai';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🧠';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    const tag = document.createElement('div');
    tag.className = 'engine-tag';
    tag.textContent = `Roundtable Debate${Array.isArray(data.engines) && data.engines.length ? ` · ${data.engines.join(', ')}` : ''}`;
    bubble.appendChild(tag);

    const panel = document.createElement('div');
    panel.style.maxHeight = '240px';
    panel.style.overflowY = 'auto';
    panel.style.border = '1px solid var(--border)';
    panel.style.borderRadius = '12px';
    panel.style.padding = '10px';
    panel.style.background = 'var(--surface-2)';
    panel.style.marginTop = '8px';
    panel.style.whiteSpace = 'pre-wrap';
    panel.style.fontSize = '0.88rem';
    panel.style.lineHeight = '1.45';
    panel.textContent = (data.transcript || []).map((item) => `Round ${item.round} · ${item.engine}\n${item.text}`).join('\n\n') || 'No transcript available.';
    bubble.appendChild(panel);

    const finalBox = document.createElement('div');
    finalBox.style.marginTop = '10px';
    finalBox.style.border = '2px solid rgba(200, 255, 77, 0.35)';
    finalBox.style.background = 'rgba(200, 255, 77, 0.08)';
    finalBox.style.borderRadius = '12px';
    finalBox.style.padding = '10px';
    finalBox.style.whiteSpace = 'pre-wrap';
    finalBox.innerHTML = `<strong>Final Answer</strong>\n${String(data.finalAnswer || 'No final answer generated.')}`;
    bubble.appendChild(finalBox);

    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    const explainBtn = document.createElement('button');
    explainBtn.type = 'button';
    explainBtn.className = 'msg-action-btn';
    explainBtn.textContent = 'Explain differently';
    explainBtn.addEventListener('click', () => {
      sendMessage(sourcePrompt);
    });
    actions.appendChild(explainBtn);
    bubble.appendChild(actions);

    row.appendChild(avatar);
    row.appendChild(bubble);
    messages.appendChild(row);
    document.getElementById('chatFeed').scrollTop = document.getElementById('chatFeed').scrollHeight;
  }

  async function explainItBack(concept, aiReply) {
    const explanation = window.prompt('Explain this concept back in your own words. If your explanation is clear, you earn +20 XP bonus.');
    if (!explanation || !String(explanation).trim()) return;

    const conceptText = String(concept || aiReply || 'Concept').slice(0, 220);

    try {
      const { response } = await fetchWithApiFallback('/api/explain-check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          concept: conceptText,
          studentExplanation: explanation,
        }),
      });
      const data = await response.json();
      const feedback = String(data?.feedback || 'Nice effort. Keep practicing your own explanation style.');
      const understood = Boolean(data?.understood);
      recordExplainCheck(conceptText, explanation, feedback, understood);
      appendMessage(`Explain-check feedback: ${feedback}\nBonus XP awarded: ${understood ? '+20' : '+0'}`, 'ai', 'Coach');
      refreshTopBar();
    } catch {
      appendMessage('Explain-check is unavailable right now. Try again in a moment.', 'ai', 'System');
    }
  }

  async function sendMessage(overrideText, options = {}) {
    const text = (overrideText || chatInput.value || '').trim();
    const attachments = Array.isArray(options.attachments) ? options.attachments : consumeAttachments();
    if (!text) return;
    const subject = lsGet('mm_subject', 'General');
    const attachmentNote = attachments.length
      ? `\n\nAttached: ${attachments.map((item) => item.name).join(', ')}`
      : '';
    appendMessage(`${text}${attachmentNote}`, 'user');
    chatInput.value = '';
    if (roundtableMode) {
      showStageIndicator('Round 1: gathering perspectives...');
      const t2 = setTimeout(() => showStageIndicator('Round 2: AIs are debating...'), 2600);
      const t3 = setTimeout(() => showStageIndicator('Finalizing answer...'), 5200);
      const debate = await fetchRoundtableDebate(text, subject);
      clearTimeout(t2);
      clearTimeout(t3);
      hideStageIndicator();
      if (debate.error) {
        appendMessage(debate.error, 'ai', 'System');
      } else {
        renderDebateResult(debate, text);
        recordConversation(subject, `[Roundtable] ${text}`, debate.finalAnswer || '');
      }
    } else {
      showTyping();
      const { reply, engine } = await fetchAIResponse(text, subject, { ...options, attachments });
      if (typingIndicator) {
        typingIndicator.remove();
        typingIndicator = null;
      }
      appendMessage(reply, 'ai', engine, text);
      recordConversation(subject, text, reply);
    }
    recordChat(subject);
    refreshTopBar();
  }

  document.querySelectorAll('.quick-prompt-card').forEach((card) => {
    card.addEventListener('click', () => {
      chatInput.value = card.dataset.prompt;
      sendMessage();
    });
  });

  chatInput.addEventListener('keypress', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      sendMessage();
    }
  });

  sendButton.addEventListener('click', sendMessage);
  roundtableToggle?.addEventListener('click', () => {
    roundtableMode = !roundtableMode;
    roundtableToggle.textContent = `Roundtable: ${roundtableMode ? 'ON' : 'OFF'}`;
    roundtableToggle.style.borderColor = roundtableMode ? 'var(--lime)' : 'var(--border)';
    roundtableToggle.style.color = roundtableMode ? 'var(--lime)' : 'var(--ink-soft)';
  });
  attachButton?.addEventListener('click', () => fileInput?.click());
  fileInput?.addEventListener('change', async (event) => {
    await addFiles(Array.from(event.target.files || []));
  });
  const params = new URLSearchParams(window.location.search);
  pendingQuestion = params.get('q');
  if (pendingQuestion) {
    chatInput.value = pendingQuestion;
  }
  loadModelInfo();
  refreshTopBar();
})();
</script>
</body>
</html>
