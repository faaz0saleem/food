<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMesh — Subjects</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/brand.css">
    <link rel="stylesheet" href="/nav.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        background: '#130d26',
                        panel: '#2a1f4c',
                        panelHover: '#352861',
                        primary: '#b8ff4a',
                        text: '#e2dbea',
                        muted: '#9a8db8',
                        navBg: '#1e1638'
                    }
                }
            }
        }
    </script>
    <style>
        body { background: linear-gradient(135deg, #130d26 0%, #1a1133 50%, #221442 100%); color: #e2dbea; min-height: 100vh; }
        .glass-panel { background: rgba(42, 31, 76, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(154, 141, 184, 0.15); border-radius: 20px; transition: all 0.3s ease; }
        .glass-panel:hover { border-color: rgba(184, 255, 74, 0.3); transform: translateY(-2px); }
        .hero-note { color: #9a8db8; }
        .hero-note .developer-note { color: #b8ff4a; font-style: italic; }
        .subject-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; }
        @media (min-width: 768px) { .subject-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
        @media (min-width: 1024px) { .subject-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); } }
    </style>
</head>
<body data-page="subjects" class="font-sans antialiased p-4 md:p-8">
    <header class="site-nav"></header>

    <main class="max-w-7xl mx-auto">
        <section class="mb-12">
            <h1 class="text-4xl font-extrabold text-white mb-4">Explore Subjects</h1>
            <p class="hero-note">Select a field to master. Your picks sync with your dashboard and AI tutor.</p>
        </section>

        <div class="subject-grid" id="subjectsGrid">
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">⚛️</span>
                <span class="font-medium">Physics</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">🧬</span>
                <span class="font-medium">Biology</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">🧮</span>
                <span class="font-medium">Math</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">📜</span>
                <span class="font-medium">History</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">💻</span>
                <span class="font-medium">Coding</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">🌍</span>
                <span class="font-medium">Geography</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">⚗️</span>
                <span class="font-medium">Chemistry</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">📈</span>
                <span class="font-medium">Economics</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">🎨</span>
                <span class="font-medium">Art</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">🎵</span>
                <span class="font-medium">Music</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">⚖️</span>
                <span class="font-medium">Philosophy</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">🔭</span>
                <span class="font-medium">Astronomy</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">🗣️</span>
                <span class="font-medium">Languages</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">🏗️</span>
                <span class="font-medium">Engineering</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">🧠</span>
                <span class="font-medium">Psychology</span>
            </button>
            <button class="glass-panel p-6 flex flex-col items-center gap-4 hover:border-primary subject-button">
                <span class="text-4xl">📖</span>
                <span class="font-medium">Literature</span>
            </button>
        </div>
    </main>

    <script src="/script.js" defer></script>
    <script defer>
        window.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.subject-button');
            buttons.forEach((btn) => {
                btn.addEventListener('click', () => {
                    const subject = btn.querySelector('span:last-child').textContent;
                    const selected = lsGet('mm_selectedSubjects', []);
                    if (!selected.includes(subject)) {
                        selected.push(subject);
                        lsSet('mm_selectedSubjects', selected);
                    }
                    lsSet('mm_subject', subject);
                    const subjectsData = lsGet('mm_subjects', {});
                    subjectsData[subject] = (subjectsData[subject] || 0) + 1;
                    lsSet('mm_subjects', subjectsData);
                    window.location.href = '/dashboard.html';
                });
            });
        });
    </script>
    <script src="/layout.js" defer></script>
</body>
</html>
