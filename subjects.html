<!DOCTYPE html>
<html lang="en">
<head>
  <!-- BASE_URL: https://YOUR_DOMAIN_HERE -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hungter — Subjects</title>
  <meta name="description" content="Browse and choose subjects in Hungter to personalize your AI tutoring journey.">
  <link rel="canonical" href="https://YOUR_DOMAIN_HERE/subjects.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Hungter — Subjects">
  <meta property="og:description" content="Explore subjects and start a focused learning track with Hungter.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/brand.css">
  <link rel="stylesheet" href="/nav.css">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/subjects.css">
</head>
<body data-page="subjects">
  <div class="top-bar"><div class="top-bar-fill" id="topBar" style="width:0%"></div></div>
  <header class="site-nav"></header>

  <main class="subjects-page">
    <section class="subjects-hero">
      <p class="eyebrow">Explore Subjects</p>
      <h1>Choose the field you want to master next.</h1>
      <p>Every pick updates your Hungter profile, syncs your current subject, and gives the AI tutor more context for what to teach next.</p>
    </section>

    <section class="subjects-controls">
      <div class="subjects-controls-row">
        <div>
          <p class="quiz-label">Find a subject</p>
          <input id="subjectSearch" class="subject-search" type="search" placeholder="Search by name or description">
        </div>
        <a href="/chat.html" class="subject-quick-link">Open AI Tutor</a>
      </div>
      <div>
        <p class="quiz-label">Filter</p>
        <div class="subject-filter-row">
          <select id="categoryFilter" class="subject-filter">
            <option value="All">All categories</option>
          </select>
          <select id="statusFilter" class="subject-filter">
            <option value="all">All progress</option>
            <option value="explored">Explored only</option>
            <option value="new">New only</option>
          </select>
        </div>
      </div>
    </section>

    <section id="subjectsGrid" class="subject-grid"></section>
  </main>

  <script src="/api-config.js"></script>
<script src="/script.js"></script>
  <script src="/layout.js" defer></script>
  <script>
    ensureProfile();

    const topBar = document.getElementById('topBar');
    const subjectsGrid = document.getElementById('subjectsGrid');
    const subjectSearch = document.getElementById('subjectSearch');
    const categoryFilter = document.getElementById('categoryFilter');
    const statusFilter = document.getElementById('statusFilter');

    function refreshTopBar() {
      const progress = getLevelProgress();
      if (topBar) {
        topBar.style.width = `${progress.pct}%`;
      }
    }

    function getSelectedSubjects() {
      return lsGet('mm_selectedSubjects', []);
    }

    function saveSubject(subjectName) {
      const selected = getSelectedSubjects();
      if (!selected.includes(subjectName)) {
        selected.push(subjectName);
        lsSet('mm_selectedSubjects', selected);
      }
      lsSet('mm_subject', subjectName);
      const subjectsData = lsGet('mm_subjects', {});
      subjectsData[subjectName] = (subjectsData[subjectName] || 0) + 1;
      lsSet('mm_subjects', subjectsData);
      window.location.href = '/dashboard.html';
    }

    function populateCategoryFilter() {
      const categories = Array.from(new Set(subjects.map((subject) => subject.category))).sort();
      categoryFilter.innerHTML = ['<option value="All">All categories</option>']
        .concat(categories.map((category) => `<option value="${category}">${category}</option>`))
        .join('');
    }

    function renderSubjects() {
      const query = subjectSearch.value.trim().toLowerCase();
      const category = categoryFilter.value;
      const status = statusFilter.value;
      const explored = lsGet('mm_subjects', {});
      const filtered = subjects.filter((subject) => {
        const matchesQuery = !query || subject.name.toLowerCase().includes(query) || subject.description.toLowerCase().includes(query);
        const matchesCategory = category === 'All' || subject.category === category;
        const count = explored[subject.name] || 0;
        const matchesStatus = status === 'all' || (status === 'explored' ? count > 0 : count === 0);
        return matchesQuery && matchesCategory && matchesStatus;
      });

      if (!filtered.length) {
        subjectsGrid.innerHTML = '<div class="empty-state">No subjects matched that filter. Try a broader search or switch the progress view.</div>';
        return;
      }

      subjectsGrid.innerHTML = filtered.map((subject) => {
        const count = explored[subject.name] || 0;
        const statusText = count > 0 ? `Explored ${count} time${count === 1 ? '' : 's'}` : 'New subject';
        return `
          <article class="subject-card">
            <div class="subject-card-head">
              <div class="subject-icon">${subject.icon}</div>
              <div>
                <div class="subject-chip">${subject.category}</div>
                <h2>${subject.name}</h2>
                <p>${subject.description}</p>
              </div>
            </div>
            <div class="subject-card-actions">
              <span class="subject-meta">${statusText}</span>
              <button type="button" class="subject-action" data-subject="${subject.name}">Start Learning</button>
            </div>
          </article>
        `;
      }).join('');

      document.querySelectorAll('.subject-action').forEach((button) => {
        button.addEventListener('click', () => saveSubject(button.dataset.subject));
      });
    }

    subjectSearch.addEventListener('input', renderSubjects);
    categoryFilter.addEventListener('change', renderSubjects);
    statusFilter.addEventListener('change', renderSubjects);

    populateCategoryFilter();
    refreshTopBar();
    renderSubjects();
  </script>
</body>
</html>
