<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Hungter</title>
<link rel="stylesheet" href="/styles.css?v=20260711">
</head>
<body data-page="reset-password">
  <main class="page-card" style="max-width:560px;margin:60px auto;padding:24px;">
    <h1>Reset password</h1>
    <p>Step 1: request a 6-digit reset code for your email.</p>
    <input id="email" type="email" placeholder="you@example.com" style="width:100%;" />
    <button id="requestBtn" class="button button-secondary" style="margin-top:10px;">Request reset code</button>
    <p id="codeHint" style="margin-top:8px;color:#a9b2d6;"></p>

    <p style="margin-top:16px;">Step 2: submit code and new password.</p>
    <input id="code" type="text" maxlength="6" placeholder="6-digit code" style="width:100%;" />
    <input id="newPassword" type="password" minlength="8" placeholder="New password (min 8 chars)" style="width:100%;margin-top:10px;" />
    <button id="resetBtn" class="button button-primary" style="margin-top:10px;">Reset password</button>
    <p id="status"></p>
  </main>
  <script src="/api-config.js?v=20260711"></script>
  <script>
    const API_BASE = String(window.HUNGTER_API_BASE || '').replace(/\/$/, '');
    const apiPath = (p) => `${API_BASE}${p}`;
    const status = document.getElementById('status');

    document.getElementById('requestBtn').addEventListener('click', async () => {
      const email = (document.getElementById('email').value || '').trim();
      status.textContent = 'Requesting code...';
      const res = await fetch(apiPath('/api/auth/request-password-reset'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { status.textContent = data.error || 'Request failed.'; return; }
      if (data.devCode) document.getElementById('codeHint').textContent = `Dev code: ${data.devCode}`;
      status.textContent = data.message || 'If the account exists, a reset code was issued.';
    });

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const email = (document.getElementById('email').value || '').trim();
      const code = (document.getElementById('code').value || '').trim();
      const newPassword = document.getElementById('newPassword').value || '';
      status.textContent = 'Resetting password...';
      const res = await fetch(apiPath('/api/auth/reset-password'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, code, newPassword }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { status.textContent = data.error || 'Reset failed.'; return; }
      status.textContent = 'Password reset complete. You can sign in now.';
    });
  </script>
</body>
</html>
