    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Fredoka:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap">
    <title>Profile | Hungter</title>
    <meta name="description" content="Manage your Hungter profile, learning style, theme, and progress settings.">
<meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://hungter.com/profile.html">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Profile | Hungter">
    <meta property="og:description" content="Customize your learning preferences and account profile in Hungter.">
    <link rel="stylesheet" href="/styles.css?v=20260711" />
  </head>
  <body data-page="profile">
    <div class="page-shell fade-in">
      <header class="site-nav"></header>
      <main class="page-card profile-card">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Your profile</p>
            <h1>Manage your learning preferences.</h1>
          </div>
        </div>
        <section class="profile-header">
          <div id="profile-avatar" class="avatar-large">MM</div>
          <div>
            <label>Name</label>
            <input id="profile-name" type="text" />
          </div>
        </section>
        <section>
          <h2>Learning style</h2>
          <div class="grid-4">
            <button class="card learning-style-card" data-value="Visual">Visual 👁</button>
            <button class="card learning-style-card" data-value="Examples">Examples 💡</button>
            <button class="card learning-style-card" data-value="Step-by-step">Step-by-step 📝</button>
            <button class="card learning-style-card" data-value="Stories">Stories 📖</button>
          </div>
        </section>
        <section>
          <label>Favourite subject</label>
          <select id="profile-subject"></select>
        </section>
        <section>
          <div class="label-row">
            <span>Theme</span>
            <label class="toggle-switch">
              <input id="theme-toggle" type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>
        </section>
        <section>
          <h2>Avatar color</h2>
          <div class="avatar-colors">
            <button class="avatar-color" data-color="#7b7cff"></button>
            <button class="avatar-color" data-color="#74f0d8"></button>
            <button class="avatar-color" data-color="#ffb572"></button>
            <button class="avatar-color" data-color="#ff6fbf"></button>
            <button class="avatar-color" data-color="#6fffe9"></button>
            <button class="avatar-color" data-color="#d47bff"></button>
          </div>
        </section>
        <section class="danger-zone">
          <h2>Danger zone</h2>
          <button id="reset-progress" class="button button-danger">Reset all progress</button>
        </section>
        <div class="page-actions">
          <button id="save-profile" class="button button-primary">Save changes</button>
          <div id="save-toast" class="toast">Settings saved!</div>
        </div>
      </main>
    </div>
    <script src="/layout.js?v=20260711" defer></script>
    <script src="/api-config.js?v=20260711"></script>
<script src="/script.js?v=20260711" defer></script>
  </body>
</html>
